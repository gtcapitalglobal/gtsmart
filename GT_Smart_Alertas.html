<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT Smart - Central de Alertas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #b71c1c 0%, #c62828 100%); min-height: 100vh; padding: 15px; }
        .container { max-width: 1000px; margin: 5px auto; background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #b71c1c, #c62828); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .header h2 { font-size: 18px; }
        .header-right { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .btn-link { background: rgba(255,255,255,0.2); color: white; border: 2px solid white; padding: 7px 13px; border-radius: 6px; font-weight: 600; font-size: 12px; text-decoration: none; cursor: pointer; }
        .content { padding: 15px 20px; }

        /* Contadores */
        .counters-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
        .counter-card { border-radius: 10px; padding: 12px; text-align: center; }
        .counter-card .cc-label { font-size: 10px; font-weight: 700; text-transform: uppercase; opacity: 0.8; margin-bottom: 4px; }
        .counter-card .cc-value { font-size: 24px; font-weight: 800; }
        .cc-critico { background: #fdecea; color: #c62828; }
        .cc-atencao { background: #fff8e1; color: #f57f17; }
        .cc-info { background: #e3f2fd; color: #1565c0; }

        /* Seções de alertas */
        .alerta-secao { margin-bottom: 20px; }
        .alerta-secao-titulo { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .titulo-critico { background: #fdecea; color: #c62828; }
        .titulo-atencao { background: #fff8e1; color: #f57f17; }
        .titulo-info { background: #e3f2fd; color: #1565c0; }

        .alerta-item { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 8px; margin-bottom: 8px; }
        .alerta-item-texto .ai-tipo { font-size: 11px; font-weight: 700; margin-bottom: 3px; }
        .alerta-item-texto .ai-msg { font-size: 13px; font-weight: 600; color: #333; }
        .alerta-item-btn { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; text-decoration: none; white-space: nowrap; color: white; }

        /* Loading */
        .loading-box { text-align: center; padding: 30px; color: #999; font-size: 14px; }
        .loading-box .spin { font-size: 32px; display: block; margin-bottom: 10px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Última atualização */
        .ultima-atualizacao { text-align: center; font-size: 11px; color: #aaa; padding: 8px; }

        @media (max-width: 600px) {
            .counters-grid { grid-template-columns: repeat(3, 1fr); }
            .header { flex-direction: column; text-align: center; }
            .alerta-item { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>🚨 Central de Alertas</h2>
            <div class="header-right">
                <button class="btn-link" onclick="carregarTudo()">🔄 Atualizar</button>
                <a href="GT_Smart_Menu.html" class="btn-link">← Menu</a>
            </div>
        </div>
        <div class="content">

            <!-- Contadores -->
            <div class="counters-grid">
                <div class="counter-card cc-critico">
                    <div class="cc-label">🚨 Críticos</div>
                    <div class="cc-value" id="totalCriticos">—</div>
                </div>
                <div class="counter-card cc-atencao">
                    <div class="cc-label">⚠️ Atenção</div>
                    <div class="cc-value" id="totalAtencao">—</div>
                </div>
                <div class="counter-card cc-info">
                    <div class="cc-label">📋 Informativos</div>
                    <div class="cc-value" id="totalInfo">—</div>
                </div>
            </div>

            <!-- Loading -->
            <div class="loading-box" id="loading">
                <span class="spin">⏳</span>
                Carregando dados de todos os módulos...
            </div>

            <!-- Alertas Críticos -->
            <div class="alerta-secao" id="secaoCritico" style="display:none;">
                <div class="alerta-secao-titulo titulo-critico">🚨 Críticos — Ação Imediata</div>
                <div id="alertasCriticos"></div>
            </div>

            <!-- Alertas Atenção -->
            <div class="alerta-secao" id="secaoAtencao" style="display:none;">
                <div class="alerta-secao-titulo titulo-atencao">⚠️ Atenção</div>
                <div id="alertasAtencao"></div>
            </div>

            <!-- Alertas Informativos -->
            <div class="alerta-secao" id="secaoInfo" style="display:none;">
                <div class="alerta-secao-titulo titulo-info">📋 Informativos</div>
                <div id="alertasInformativos"></div>
            </div>

            <div class="ultima-atualizacao">Última atualização: <span id="ultimaAtualizacao">—</span></div>
        </div>
        <p style="text-align:center;font-size:11px;opacity:0.5;padding:10px;">Basic 8.0 | 11/03/2026</p>
    </div>

    <a href="GT_Smart_Menu.html" style="position:fixed;bottom:20px;right:20px;background:#b71c1c;color:white;padding:10px 18px;border-radius:25px;text-decoration:none;font-weight:700;font-size:13px;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:999;">🏠 Menu</a>

    <script type="module">
        import { auth, onAuthStateChanged, getLoans, getDebts, getCards, getDefiPools, getDefiBorrows, getDefiPositions } from './firebase-config.js';

        const NIVEIS = {
            CRITICO:     { emoji: '🚨', label: 'Crítico',    cor: '#c62828', bg: '#fdecea' },
            ATENCAO:     { emoji: '⚠️',  label: 'Atenção',    cor: '#f57f17', bg: '#fff8e1' },
            INFORMATIVO: { emoji: '📋', label: 'Informativo', cor: '#1565c0', bg: '#e3f2fd' },
        };

        const precos = {};

        async function carregarPrecos(ids) {
            if (!ids || ids.length === 0) return;
            try {
                const url = 'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=' + ids.join(',') + '&sparkline=false&per_page=100';
                const r = await fetch(url);
                if (!r.ok) return;
                const coins = await r.json();
                coins.forEach(c => { precos[c.id] = c.current_price; });
            } catch(e) { console.error('Erro preços alertas:', e); }
        }

        function getPrice(id) { return precos[id] || 0; }

        function coletarCryptoIds(pools, borrows, colateral) {
            const ids = new Set();
            (pools || []).forEach(p => { if (p.tokenAId) ids.add(p.tokenAId); if (p.tokenBId) ids.add(p.tokenBId); });
            (borrows || []).forEach(b => { if (b.cryptoId) ids.add(b.cryptoId); });
            (colateral || []).forEach(c => { if (c.cryptoId) ids.add(c.cryptoId); });
            return [...ids].filter(Boolean);
        }

        // ===== FONTES DE ALERTAS =====

        function alertasEmprestimos(loans) {
            const hoje = new Date();
            const alertas = [];
            for (const l of (loans || [])) {
                if (l.status === 'finished' || l.archived) continue;
                // Checar próxima parcela não paga
                const proxima = (l.payments || []).find(p => !p.paid && !p.negotiated);
                if (!proxima) continue;
                const venc = proxima.date ? new Date(proxima.date + 'T12:00:00') : null;
                if (!venc) continue;
                const dias = Math.floor((venc - hoje) / 86400000);
                const nome = l.clientName || l.nome || 'Empréstimo';
                if (dias < 0) alertas.push({ nivel: 'CRITICO', modulo: 'Empréstimos', msg: nome + ' — parcela atrasada há ' + Math.abs(dias) + ' dias', link: 'GT_Smart_Detalhe_Emprestimo.html?id=' + l.id });
                else if (dias <= 7) alertas.push({ nivel: 'ATENCAO', modulo: 'Empréstimos', msg: nome + ' — vence em ' + dias + ' dia(s)', link: 'GT_Smart_Detalhe_Emprestimo.html?id=' + l.id });
                else if (dias <= 30) alertas.push({ nivel: 'INFORMATIVO', modulo: 'Empréstimos', msg: nome + ' — vence em ' + dias + ' dias', link: 'GT_Smart_Detalhe_Emprestimo.html?id=' + l.id });
            }
            return alertas;
        }

        function alertasDividas(debts) {
            const hoje = new Date();
            const alertas = [];
            for (const d of (debts || [])) {
                if (d.status === 'pago') continue;
                if (!d.dataVencimento) continue;
                const venc = new Date(d.dataVencimento + 'T12:00:00');
                const dias = Math.floor((venc - hoje) / 86400000);
                const nome = d.nome || d.credor || 'Dívida';
                if (dias < 0) alertas.push({ nivel: 'CRITICO', modulo: 'Dívidas', msg: nome + ' — atrasada há ' + Math.abs(dias) + ' dias', link: 'GT_Smart_Minhas_Dividas.html' });
                else if (dias <= 7) alertas.push({ nivel: 'ATENCAO', modulo: 'Dívidas', msg: nome + ' — vence em ' + dias + ' dia(s)', link: 'GT_Smart_Minhas_Dividas.html' });
                else if (dias <= 30) alertas.push({ nivel: 'INFORMATIVO', modulo: 'Dívidas', msg: nome + ' — vence em ' + dias + ' dias', link: 'GT_Smart_Minhas_Dividas.html' });
            }
            return alertas;
        }

        function alertasCartoes(cards) {
            const hoje = new Date();
            const alertas = [];
            for (const c of (cards || [])) {
                const limite = c.limite || c.limiteTotal || 0;
                const saldo = c.saldoUsado || c.saldoAtual || 0;
                const uso = limite > 0 ? (saldo / limite * 100) : 0;
                const nome = c.nome || c.name || 'Cartão';
                if (uso >= 90) alertas.push({ nivel: 'CRITICO', modulo: 'Cartões', msg: nome + ' — uso crítico ' + uso.toFixed(0) + '%', link: 'GT_Smart_Cartoes.html' });
                else if (uso >= 70) alertas.push({ nivel: 'ATENCAO', modulo: 'Cartões', msg: nome + ' — uso alto ' + uso.toFixed(0) + '%', link: 'GT_Smart_Cartoes.html' });

                if (c.dataFatura || c.closingDate) {
                    const dataF = c.dataFatura || c.closingDate;
                    const dias = Math.floor((new Date(dataF + 'T12:00:00') - hoje) / 86400000);
                    if (dias < 0) alertas.push({ nivel: 'CRITICO', modulo: 'Cartões', msg: nome + ' — fatura atrasada', link: 'GT_Smart_Cartoes.html' });
                    else if (dias <= 5) alertas.push({ nivel: 'ATENCAO', modulo: 'Cartões', msg: nome + ' — fatura vence em ' + dias + ' dia(s)', link: 'GT_Smart_Cartoes.html' });
                }
                if (c.dataBonus) {
                    const dias = Math.floor((new Date(c.dataBonus + 'T12:00:00') - hoje) / 86400000);
                    if (dias >= 0 && dias <= 15) alertas.push({ nivel: 'ATENCAO', modulo: 'Cartões', msg: nome + ' — bônus expira em ' + dias + ' dias', link: 'GT_Smart_Cartoes.html' });
                }
                if (c.dataPromo) {
                    const dias = Math.floor((new Date(c.dataPromo + 'T12:00:00') - hoje) / 86400000);
                    if (dias >= 0 && dias <= 30) alertas.push({ nivel: 'INFORMATIVO', modulo: 'Cartões', msg: nome + ' — promoção acaba em ' + dias + ' dias', link: 'GT_Smart_Cartoes.html' });
                }
            }
            return alertas;
        }

        function alertasColateral(colateral, borrows) {
            const alertas = [];
            const chains = [...new Set((colateral || []).map(c => c.chain).filter(Boolean))];
            for (const chain of chains) {
                const cols = (colateral || []).filter(c => c.chain === chain && c.status !== 'fechado');
                const bors = (borrows || []).filter(b => b.chain === chain && b.status !== 'fechado');
                if (!cols.length || !bors.length) continue;
                const hfNum = cols.reduce((s, c) => {
                    const val = (c.amount || c.quantidade || 0) * getPrice(c.cryptoId);
                    return s + val * ((c.liqThreshold || c.liquidationThreshold || 80) / 100);
                }, 0);
                const hfDen = bors.reduce((s, b) => s + (b.amount || b.quantidade || 0) * getPrice(b.cryptoId), 0);
                const hf = hfDen > 0 ? hfNum / hfDen : 999;
                if (hf < 1.2) alertas.push({ nivel: 'CRITICO', modulo: 'DeFi Colateral', msg: 'Health Factor ' + chain + ': ' + hf.toFixed(2) + ' — RISCO DE LIQUIDAÇÃO', link: 'GT_Smart_DeFi_Colateral.html' });
                else if (hf < 1.5) alertas.push({ nivel: 'ATENCAO', modulo: 'DeFi Colateral', msg: 'Health Factor ' + chain + ': ' + hf.toFixed(2) + ' — Atenção', link: 'GT_Smart_DeFi_Colateral.html' });
            }
            return alertas;
        }

        function alertasBorrows(borrows) {
            const alertas = [];
            for (const b of (borrows || [])) {
                if (b.status === 'fechado') continue;
                const liqP = parseFloat(b.liquidationPrice || 0);
                if (!liqP || liqP <= 0) continue;
                const current = getPrice(b.cryptoId);
                if (!current) continue;
                const dist = ((current - liqP) / current) * 100;
                const sym = (b.cryptoSymbol || b.symbol || '').toUpperCase();
                if (dist < 10) alertas.push({ nivel: 'CRITICO', modulo: 'DeFi Borrows', msg: sym + ' — apenas ' + dist.toFixed(1) + '% até liquidação ($' + liqP + ')', link: 'GT_Smart_DeFi_Borrows.html' });
                else if (dist < 20) alertas.push({ nivel: 'ATENCAO', modulo: 'DeFi Borrows', msg: sym + ' — ' + dist.toFixed(1) + '% de distância da liquidação', link: 'GT_Smart_DeFi_Borrows.html' });
            }
            return alertas;
        }

        function alertasPools(pools) {
            const hoje = new Date();
            const alertas = [];
            for (const p of (pools || [])) {
                if (p.status === 'closed' || p.status === 'fechado') continue;
                const priceA = getPrice(p.tokenAId || p.tokenA);
                const priceB = getPrice(p.tokenBId || p.tokenB);
                if (!priceA || !priceB) continue;
                const ratio = priceA / priceB;
                const inRange = ratio >= (p.rangeMin || 0) && ratio <= (p.rangeMax || Infinity);
                const nome = p.poolName || ((p.tokenASymbol || '?').toUpperCase() + '/' + (p.tokenBSymbol || '?').toUpperCase());
                if (!inRange && p.outOfRangeSince) {
                    const dias = Math.floor((hoje - new Date(p.outOfRangeSince)) / 86400000);
                    if (dias >= 3) alertas.push({ nivel: 'ATENCAO', modulo: 'DeFi Pools', msg: nome + ' — fora do range há ' + dias + ' dias', link: 'GT_Smart_DeFi_Pools.html' });
                    else alertas.push({ nivel: 'INFORMATIVO', modulo: 'DeFi Pools', msg: nome + ' — saiu do range recentemente', link: 'GT_Smart_DeFi_Pools.html' });
                } else if (!inRange && !p.outOfRangeSince) {
                    alertas.push({ nivel: 'INFORMATIVO', modulo: 'DeFi Pools', msg: nome + ' — fora do range', link: 'GT_Smart_DeFi_Pools.html' });
                }
            }
            return alertas;
        }

        // ===== RENDERIZAÇÃO =====

        function renderAlertas(todos) {
            const criticos     = todos.filter(a => a.nivel === 'CRITICO');
            const atencao      = todos.filter(a => a.nivel === 'ATENCAO');
            const informativos = todos.filter(a => a.nivel === 'INFORMATIVO');

            document.getElementById('totalCriticos').textContent = criticos.length;
            document.getElementById('totalAtencao').textContent  = atencao.length;
            document.getElementById('totalInfo').textContent     = informativos.length;

            function renderGrupo(lista, nivel) {
                const n = NIVEIS[nivel];
                if (!lista.length) return '<div style="color:#aaa;font-size:13px;padding:10px 0;">Nenhum ' + n.label.toLowerCase() + ' 👍</div>';
                return lista.map(a => {
                    return '<div class="alerta-item" style="background:' + n.bg + ';border-left:4px solid ' + n.cor + ';">' +
                        '<div class="alerta-item-texto">' +
                            '<div class="ai-tipo" style="color:' + n.cor + ';">' + n.emoji + ' ' + n.label + ' · ' + a.modulo + '</div>' +
                            '<div class="ai-msg">' + a.msg + '</div>' +
                        '</div>' +
                        '<a href="' + a.link + '" class="alerta-item-btn" style="background:' + n.cor + ';">Ver →</a>' +
                    '</div>';
                }).join('');
            }

            document.getElementById('alertasCriticos').innerHTML     = renderGrupo(criticos, 'CRITICO');
            document.getElementById('alertasAtencao').innerHTML      = renderGrupo(atencao, 'ATENCAO');
            document.getElementById('alertasInformativos').innerHTML = renderGrupo(informativos, 'INFORMATIVO');

            document.getElementById('secaoCritico').style.display = 'block';
            document.getElementById('secaoAtencao').style.display = 'block';
            document.getElementById('secaoInfo').style.display    = 'block';
            document.getElementById('ultimaAtualizacao').textContent = new Date().toLocaleString('pt-BR');
        }

        // ===== INICIALIZAÇÃO =====

        window.carregarTudo = async function() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('secaoCritico').style.display = 'none';
            document.getElementById('secaoAtencao').style.display = 'none';
            document.getElementById('secaoInfo').style.display    = 'none';
            document.getElementById('totalCriticos').textContent = '—';
            document.getElementById('totalAtencao').textContent  = '—';
            document.getElementById('totalInfo').textContent     = '—';
            try {
                const [loans, debts, cards, pools, borrows, colateral] = await Promise.all([
                    getLoans(), getDebts(), getCards(),
                    getDefiPools(), getDefiBorrows(), getDefiPositions()
                ]);
                const cryptoIds = coletarCryptoIds(pools, borrows, colateral);
                if (cryptoIds.length) await carregarPrecos(cryptoIds);

                const alertas = [
                    ...alertasEmprestimos(loans),
                    ...alertasDividas(debts),
                    ...alertasCartoes(cards),
                    ...alertasColateral(colateral, borrows),
                    ...alertasBorrows(borrows),
                    ...alertasPools(pools),
                ];
                renderAlertas(alertas);
            } catch(err) {
                console.error('Erro ao carregar alertas:', err);
                document.getElementById('loading').innerHTML = '<div style="color:#c62828;padding:20px;text-align:center;">❌ Erro ao carregar. Tente atualizar.</div>';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'GT_Smart_Login.html'; return; }
            await carregarTudo();
        });
    </script>
</body>
</html>
