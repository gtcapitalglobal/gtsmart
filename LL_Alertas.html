<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledgerlands — Alertas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #b71c1c 0%, #c62828 100%); min-height: 100vh; padding: 15px; }
        .container { max-width: 1000px; margin: 5px auto; background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #b71c1c, #c62828); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .header h2 { font-size: 18px; font-weight: 800; }
        .header-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn-back { background: rgba(255,255,255,0.2); color: white; border: 2px solid white; padding: 7px 13px; border-radius: 6px; font-weight: 600; font-size: 13px; text-decoration: none; }
        .btn-refresh { background: white; color: #c62828; border: none; padding: 7px 14px; border-radius: 6px; font-weight: 700; font-size: 13px; cursor: pointer; }
        .content { padding: 16px 20px; }

        /* Summary */
        .sum-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .sum-card { border-radius: 10px; padding: 14px; text-align: center; }
        .sum-card .lbl { font-size: 11px; font-weight: 700; opacity: 0.9; margin-bottom: 4px; text-transform: uppercase; }
        .sum-card .val { font-size: 26px; font-weight: 800; }
        .sc-critico { background: #fdecea; color: #c62828; }
        .sc-atencao { background: #fff8e1; color: #f57f17; }
        .sc-ok { background: #e8f5e9; color: #2e7d32; }

        /* Seção */
        .secao { margin-bottom: 24px; }
        .secao-titulo { font-size: 15px; font-weight: 800; color: #333; padding: 10px 14px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .secao-titulo.critico { background: #fdecea; color: #c62828; }
        .secao-titulo.atencao { background: #fff8e1; color: #f57f17; }

        /* Card de alerta */
        .alerta-card { border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .alerta-card.critico { background: #fff5f5; border-left: 4px solid #c62828; }
        .alerta-card.atencao { background: #fffbf0; border-left: 4px solid #f57f17; }
        .alerta-info { flex: 1; }
        .alerta-nome { font-size: 14px; font-weight: 800; color: #222; }
        .alerta-detalhe { font-size: 12px; color: #888; margin-top: 3px; }
        .alerta-valor { font-size: 15px; font-weight: 800; color: #c62828; white-space: nowrap; }
        .alerta-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

        .btn-ver { background: #c62828; color: white; border: none; padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; text-decoration: none; white-space: nowrap; }
        .btn-ver.atencao { background: #f57f17; }
        .badge { display: inline-block; padding: 3px 9px; border-radius: 10px; font-size: 11px; font-weight: 700; }
        .badge-red { background: #fdecea; color: #c62828; }
        .badge-orange { background: #fff3e0; color: #e65100; }

        .empty { text-align: center; padding: 30px; color: #aaa; font-size: 14px; }
        .tudo-ok { text-align: center; padding: 40px; background: #e8f5e9; border-radius: 12px; color: #2e7d32; }
        .tudo-ok .ok-icon { font-size: 48px; margin-bottom: 10px; }
        .tudo-ok .ok-texto { font-size: 16px; font-weight: 800; }
        .tudo-ok .ok-sub { font-size: 13px; margin-top: 4px; opacity: 0.8; }

        .ultima-atualizacao { font-size: 11px; color: #bbb; text-align: right; padding-bottom: 8px; }

        @media (max-width: 600px) {
            .sum-grid { grid-template-columns: repeat(2, 1fr); }
            .header { flex-direction: column; }
            .alerta-card { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>🚨 Alertas de Atraso</h2>
        <div class="header-right">
            <button class="btn-refresh" onclick="recarregar()">🔄 Atualizar</button>
            <a href="LL_Menu.html" class="btn-back">← Menu</a>
        </div>
    </div>
    <div class="content">
        <div id="mainContent">
            <div class="empty">⏳ Carregando alertas...</div>
        </div>
        <div class="ultima-atualizacao" id="ultimaAtualizacao"></div>
    </div>
</div>

<a href="LL_Menu.html" style="position:fixed;bottom:20px;right:20px;background:#b71c1c;color:white;padding:10px 18px;border-radius:25px;text-decoration:none;font-weight:700;font-size:13px;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:999;">🏡 Menu</a>

<script type="module">
    import { auth, onAuthStateChanged, getLLInstallments, getLLContracts, getLLPayments } from './firebase-config.js';

    const fmt2 = v => '$' + parseFloat(v || 0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    const safeDate = d => { if (!d) return null; const s = (typeof d === 'string' && d.includes('T')) ? d : d + 'T12:00:00'; const dt = new Date(s); return isNaN(dt) ? null : dt; };
    const fmtData = d => { const dt = safeDate(d); return dt ? dt.toLocaleDateString('pt-BR') : '—'; };

    let user = null;

    onAuthStateChanged(auth, async (u) => {
        if (!u) { window.location.href = 'GT_Smart_Login.html'; return; }
        user = u;
        await carregar();
    });

    window.recarregar = () => carregar();

    async function carregar() {
        document.getElementById('mainContent').innerHTML = '<div class="empty">⏳ Carregando...</div>';
        const [parcelas, contratos, pagamentos] = await Promise.all([
            getLLInstallments(), getLLContracts(), getLLPayments()
        ]);

        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0);

        // Agrupar parcelas vencidas por contrato
        const vencidasPorContrato = {};
        const prox7PorContrato = {};

        for (const p of parcelas) {
            if (p.status === 'PAID') continue;
            const dVenc = safeDate(p.dueDate);
            const dias = Math.floor((dVenc - hoje) / 86400000);

            if (dias < 0) {
                // Vencida
                if (!vencidasPorContrato[p.contractId]) vencidasPorContrato[p.contractId] = { parcelas: [], totalDue: 0 };
                vencidasPorContrato[p.contractId].parcelas.push({ ...p, diasAtraso: Math.abs(dias) });
                vencidasPorContrato[p.contractId].totalDue += parseFloat(p.amount || 0);
            } else if (dias <= 7) {
                // Vencendo em 7 dias
                if (!prox7PorContrato[p.contractId]) prox7PorContrato[p.contractId] = { parcelas: [], totalDue: 0 };
                prox7PorContrato[p.contractId].parcelas.push({ ...p, diasRestantes: dias });
                prox7PorContrato[p.contractId].totalDue += parseFloat(p.amount || 0);
            }
        }

        const totalVencidos = Object.keys(vencidasPorContrato).length;
        const totalProx7 = Object.keys(prox7PorContrato).length;
        const totalOk = contratos.filter(c => c.status === 'Active').length - totalVencidos - totalProx7;

        // Calcular valor total em atraso
        const valorEmAtraso = Object.values(vencidasPorContrato).reduce((s, v) => s + v.totalDue, 0);

        // Build HTML
        let html = `
            <div class="sum-grid">
                <div class="sum-card sc-critico">
                    <div class="lbl">🚨 Em Atraso</div>
                    <div class="val">${totalVencidos}</div>
                    <div style="font-size:11px;margin-top:3px;">${fmt2(valorEmAtraso)}</div>
                </div>
                <div class="sum-card sc-atencao">
                    <div class="lbl">⚠️ Vence em 7 dias</div>
                    <div class="val">${totalProx7}</div>
                </div>
                <div class="sum-card sc-ok">
                    <div class="lbl">✅ Em dia</div>
                    <div class="val">${Math.max(0, totalOk)}</div>
                </div>
            </div>
        `;

        if (totalVencidos === 0 && totalProx7 === 0) {
            html += `
                <div class="tudo-ok">
                    <div class="ok-icon">✅</div>
                    <div class="ok-texto">Tudo em dia!</div>
                    <div class="ok-sub">Nenhuma parcela em atraso ou vencendo em 7 dias.</div>
                </div>`;
        } else {
            // Seção CRÍTICO — em atraso
            if (totalVencidos > 0) {
                html += `<div class="secao">
                    <div class="secao-titulo critico">🚨 Parcelas em Atraso (${totalVencidos} contratos)</div>`;

                const sorted = Object.entries(vencidasPorContrato).sort((a, b) => b[1].totalDue - a[1].totalDue);
                for (const [cId, info] of sorted) {
                    const c = contratos.find(x => x.id === cId) || {};
                    const maxAtraso = Math.max(...info.parcelas.map(p => p.diasAtraso));
                    const qtd = info.parcelas.length;
                    html += `
                        <div class="alerta-card critico">
                            <div class="alerta-info">
                                <div class="alerta-nome">${c.propertyId || '—'} — ${c.buyerName || '—'}</div>
                                <div class="alerta-detalhe">
                                    ${qtd} parcela${qtd > 1 ? 's' : ''} em atraso · Maior atraso: <strong>${maxAtraso} dias</strong>
                                    ${c.county ? ' · ' + c.county : ''}${c.state ? ', ' + c.state : ''}
                                </div>
                            </div>
                            <div style="text-align:right;">
                                <div class="alerta-valor">${fmt2(info.totalDue)}</div>
                                <div style="font-size:10px;color:#aaa;margin-top:2px;">total em atraso</div>
                            </div>
                            <div class="alerta-actions">
                                <a href="LL_Detalhe_Contrato.html?id=${cId}" class="btn-ver">Ver contrato →</a>
                            </div>
                        </div>`;
                }
                html += `</div>`;
            }

            // Seção ATENÇÃO — vence em 7 dias
            if (totalProx7 > 0) {
                html += `<div class="secao">
                    <div class="secao-titulo atencao">⚠️ Vencendo nos Próximos 7 Dias (${totalProx7} contratos)</div>`;

                const sorted = Object.entries(prox7PorContrato).sort((a, b) => {
                    const dA = Math.min(...a[1].parcelas.map(p => p.diasRestantes));
                    const dB = Math.min(...b[1].parcelas.map(p => p.diasRestantes));
                    return dA - dB;
                });
                for (const [cId, info] of sorted) {
                    const c = contratos.find(x => x.id === cId) || {};
                    const minDias = Math.min(...info.parcelas.map(p => p.diasRestantes));
                    const proxVenc = info.parcelas.find(p => p.diasRestantes === minDias);
                    html += `
                        <div class="alerta-card atencao">
                            <div class="alerta-info">
                                <div class="alerta-nome">${c.propertyId || '—'} — ${c.buyerName || '—'}</div>
                                <div class="alerta-detalhe">
                                    Vence em <strong>${minDias === 0 ? 'hoje' : minDias + ' dias'}</strong>
                                    · Data: ${fmtData(proxVenc?.dueDate)}
                                    ${c.county ? ' · ' + c.county : ''}${c.state ? ', ' + c.state : ''}
                                </div>
                            </div>
                            <div style="text-align:right;">
                                <div style="font-size:15px;font-weight:800;color:#f57f17;">${fmt2(info.totalDue)}</div>
                                <div style="font-size:10px;color:#aaa;margin-top:2px;">a vencer</div>
                            </div>
                            <div class="alerta-actions">
                                <a href="LL_Detalhe_Contrato.html?id=${cId}" class="btn-ver atencao">Ver contrato →</a>
                            </div>
                        </div>`;
                }
                html += `</div>`;
            }
        }

        document.getElementById('mainContent').innerHTML = html;
        document.getElementById('ultimaAtualizacao').textContent = 'Atualizado em ' + new Date().toLocaleString('pt-BR');
    }
</script>
</body>
</html>
