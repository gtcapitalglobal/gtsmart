<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT Smart - Busca Global</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a237e 0%, #283593 100%); min-height: 100vh; padding: 15px; }
        .container { max-width: 1000px; margin: 5px auto; background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }

        .header { background: linear-gradient(135deg, #1a237e, #283593); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .header h2 { font-size: 18px; }
        .btn-back { background: rgba(255,255,255,0.2); color: white; border: 2px solid white; padding: 7px 13px; border-radius: 6px; font-weight: 600; font-size: 13px; text-decoration: none; }

        .content { padding: 15px 20px; }

        /* Barra de busca */
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-input { flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; font-family: inherit; outline: none; transition: border 0.2s; }
        .search-input:focus { border-color: #1a237e; }
        .btn-search { background: #1a237e; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; white-space: nowrap; }
        .btn-search:hover { background: #283593; }
        .btn-limpar { background: #f5f5f5; color: #666; border: 2px solid #ddd; padding: 12px 16px; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; }

        /* Filtros de módulo */
        .filtros { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .filtro-btn { padding: 5px 12px; border-radius: 20px; border: 2px solid #ddd; background: white; font-size: 12px; font-weight: 600; cursor: pointer; color: #555; transition: all 0.2s; }
        .filtro-btn.ativo { background: #1a237e; color: white; border-color: #1a237e; }

        /* Estado inicial / loading */
        .estado { text-align: center; padding: 40px 20px; color: #999; }
        .estado .icone { font-size: 48px; margin-bottom: 10px; }
        .estado p { font-size: 14px; }
        #loading { display: none; text-align: center; padding: 20px; color: #666; font-size: 14px; }

        /* Resumo dos resultados */
        .resumo { background: #f5f5f5; border-radius: 8px; padding: 10px 14px; margin-bottom: 15px; font-size: 13px; color: #555; display: none; }
        .resumo strong { color: #1a237e; }

        /* Grupos de resultado */
        .grupo { margin-bottom: 20px; }
        .grupo-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; color: white; font-size: 13px; font-weight: 700; }
        .grupo-count { background: rgba(255,255,255,0.25); padding: 2px 8px; border-radius: 12px; font-size: 11px; }

        /* Card de resultado */
        .resultado-item { border: 2px solid #e0e0e0; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 10px; transition: all 0.2s; cursor: pointer; }
        .resultado-item:hover { border-color: #1a237e; box-shadow: 0 3px 12px rgba(26,35,126,0.15); transform: translateY(-1px); }
        .resultado-info { flex: 1; min-width: 0; }
        .resultado-titulo { font-size: 14px; font-weight: 700; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .resultado-sub { font-size: 12px; color: #777; margin-top: 3px; }
        .resultado-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 12px; white-space: nowrap; flex-shrink: 0; }
        .resultado-seta { color: #bbb; font-size: 18px; flex-shrink: 0; }

        /* Highlight do termo buscado */
        mark { background: #fff176; color: #333; border-radius: 2px; padding: 0 2px; }

        /* Sem resultados */
        .sem-resultado { text-align: center; padding: 30px; color: #999; }
        .sem-resultado .icone { font-size: 36px; margin-bottom: 8px; }

        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; }
            .search-box { flex-wrap: wrap; }
            .btn-limpar { width: 100%; }
            .btn-search { flex: 1; }
            .filtros { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h2>🔍 Busca Global</h2>
                <div style="font-size:10px;opacity:0.6;margin-top:2px;">Basic 1.0 | 14/03/2026</div>
            </div>
            <a href="GT_Smart_Menu.html" class="btn-back">← Menu</a>
        </div>
        <div class="content">

            <!-- Barra de busca -->
            <div class="search-box">
                <input type="text" id="campoBusca" class="search-input" placeholder="Buscar em todo o sistema..." autocomplete="off" />
                <button onclick="executarBusca()" class="btn-search">🔍 Buscar</button>
                <button onclick="limparBusca()" class="btn-limpar">✕</button>
            </div>

            <!-- Filtros -->
            <div class="filtros" id="filtros">
                <button class="filtro-btn ativo" data-modulo="todos" onclick="toggleFiltro(this)">Todos</button>
                <button class="filtro-btn" data-modulo="emprestimos" onclick="toggleFiltro(this)">💰 Empréstimos</button>
                <button class="filtro-btn" data-modulo="dividas" onclick="toggleFiltro(this)">🔴 Dívidas</button>
                <button class="filtro-btn" data-modulo="cartoes" onclick="toggleFiltro(this)">💳 Cartões</button>
                <button class="filtro-btn" data-modulo="empresas" onclick="toggleFiltro(this)">🏢 Empresas</button>
                <button class="filtro-btn" data-modulo="defi" onclick="toggleFiltro(this)">⛓️ DeFi</button>
                <button class="filtro-btn" data-modulo="ledgerlands" onclick="toggleFiltro(this)">🏠 Ledgerlands</button>
            </div>

            <div id="loading">⏳ Buscando em todos os módulos...</div>

            <div class="resumo" id="resumo"></div>

            <!-- Estado inicial -->
            <div class="estado" id="estadoInicial">
                <div class="icone">🔍</div>
                <p>Digite um nome, valor, token, empresa ou qualquer termo<br>para buscar em todo o sistema</p>
            </div>

            <!-- Resultados -->
            <div id="resultados"></div>

        </div>
    </div>

    <a href="GT_Smart_Menu.html" style="position:fixed;bottom:20px;right:20px;background:#1a237e;color:white;padding:10px 18px;border-radius:25px;text-decoration:none;font-weight:700;font-size:13px;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:999;">🏠 Menu</a>

    <script type="module">
        import { auth, onAuthStateChanged,
            getLoans, getDebts, getCards, getEmpresas, getContracts,
            getDefiPools, getDefiBorrows, getDefiPositions,
            getLLBuyers, getLLContracts, getLLProperties
        } from './firebase-config.js';

        const fmt2 = v => '$' + parseFloat(v || 0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});

        let todosOsDados = null;
        let filtroAtivo = 'todos';
        let termoBuscado = '';

        // Módulos com suas cores e configurações
        const MODULOS = {
            emprestimos: { label: 'Empréstimos', emoji: '💰', cor: '#4a0e8f', bg: '#f3e5f5' },
            dividas:     { label: 'Dívidas',      emoji: '🔴', cor: '#b71c1c', bg: '#fdecea' },
            cartoes:     { label: 'Cartões',      emoji: '💳', cor: '#1b5e20', bg: '#e8f5e9' },
            empresas:    { label: 'Empresas',     emoji: '🏢', cor: '#263238', bg: '#eceff1' },
            contratos:   { label: 'Contratos',    emoji: '📄', cor: '#0277bd', bg: '#e3f2fd' },
            defiPools:   { label: 'DeFi Pools',   emoji: '🌊', cor: '#1b5e20', bg: '#e8f5e9' },
            defiBorrows: { label: 'DeFi Borrows', emoji: '⛓️', cor: '#b71c1c', bg: '#fdecea' },
            defiColateral:{ label: 'DeFi Colateral', emoji: '🔒', cor: '#0d47a1', bg: '#e3f2fd' },
            llBuyers:    { label: 'LL Compradores', emoji: '👤', cor: '#1565c0', bg: '#e3f2fd' },
            llContracts: { label: 'LL Contratos',  emoji: '📋', cor: '#1565c0', bg: '#e3f2fd' },
            llProperties:{ label: 'LL Propriedades', emoji: '🏡', cor: '#1565c0', bg: '#e3f2fd' },
        };

        // Mapeamento filtro → módulos
        const FILTRO_MAP = {
            todos:       Object.keys(MODULOS),
            emprestimos: ['emprestimos'],
            dividas:     ['dividas'],
            cartoes:     ['cartoes'],
            empresas:    ['empresas', 'contratos'],
            defi:        ['defiPools', 'defiBorrows', 'defiColateral'],
            ledgerlands: ['llBuyers', 'llContracts', 'llProperties'],
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'GT_Smart_Login.html'; return; }

            // Permitir busca ao pressionar Enter
            document.getElementById('campoBusca').addEventListener('keydown', e => {
                if (e.key === 'Enter') executarBusca();
            });
        });

        // Carregar todos os dados (uma vez só)
        async function carregarDados() {
            if (todosOsDados) return todosOsDados;
            const [loans, debts, cards, empresas, contratos,
                   defiPools, defiBorrows, defiColateral,
                   llBuyers, llContracts, llProperties] = await Promise.all([
                getLoans(), getDebts(), getCards(), getEmpresas(), getContracts(),
                getDefiPools(), getDefiBorrows(), getDefiPositions(),
                getLLBuyers(), getLLContracts(), getLLProperties()
            ]);
            todosOsDados = { loans, debts, cards, empresas, contratos,
                             defiPools, defiBorrows, defiColateral,
                             llBuyers, llContracts, llProperties };
            return todosOsDados;
        }

        // Verificar se um texto contém o termo
        function contem(texto, termo) {
            if (!texto || !termo) return false;
            return String(texto).toLowerCase().includes(termo.toLowerCase());
        }

        // Highlight do termo no texto
        function highlight(texto, termo) {
            if (!texto || !termo) return texto || '—';
            const regex = new RegExp('(' + termo.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
            return String(texto).replace(regex, '<mark>$1</mark>');
        }

        // Buscar em todos os módulos
        function buscarEm(dados, termo) {
            const resultados = {};

            // Empréstimos
            resultados.emprestimos = (dados.loans || []).filter(l =>
                contem(l.clientName, termo) || contem(l.id, termo) ||
                contem(l.description, termo) || contem(l.notes, termo)
            ).map(l => ({
                id: l.id,
                titulo: l.clientName || 'Empréstimo',
                sub: `Status: ${l.status === 'active' ? 'Ativo' : l.status === 'finished' ? 'Quitado' : l.status || '—'} · ${l.payments?.length || 0} parcelas`,
                badge: l.status === 'active' ? { texto: 'Ativo', cor: '#1b5e20', bg: '#e8f5e9' } : { texto: 'Quitado', cor: '#0277bd', bg: '#e3f2fd' },
                link: `GT_Smart_Detalhe_Emprestimo.html?id=${l.id}`
            }));

            // Dívidas
            resultados.dividas = (dados.debts || []).filter(d =>
                contem(d.creditorName, termo) || contem(d.id, termo) ||
                contem(d.description, termo) || contem(d.notes, termo)
            ).map(d => ({
                id: d.id,
                titulo: d.creditorName || 'Dívida',
                sub: `Status: ${d.status === 'active' ? 'Ativa' : d.status === 'finished' ? 'Quitada' : d.status || '—'}`,
                badge: d.status === 'active' ? { texto: 'Ativa', cor: '#b71c1c', bg: '#fdecea' } : { texto: 'Quitada', cor: '#555', bg: '#f5f5f5' },
                link: `GT_Smart_Minhas_Dividas.html`
            }));

            // Cartões
            resultados.cartoes = (dados.cards || []).filter(c =>
                contem(c.nome, termo) || contem(c.banco, termo) ||
                contem(c.tipo, termo) || contem(c.obs, termo)
            ).map(c => ({
                id: c.id,
                titulo: c.nome || 'Cartão',
                sub: `${c.banco || '—'} · Limite: ${fmt2(c.limite)} · Usado: ${fmt2(c.saldoUsado)}`,
                badge: { texto: c.tipo || 'Cartão', cor: '#1b5e20', bg: '#e8f5e9' },
                link: `GT_Smart_Detalhe_Cartao.html?id=${c.id}`
            }));

            // Empresas
            resultados.empresas = (dados.empresas || []).filter(e =>
                contem(e.nome, termo) || contem(e.ein, termo) ||
                contem(e.tipo, termo) || contem(e.email, termo) ||
                contem(e.estado, termo) || contem(e.endereco, termo) ||
                contem(e.responsavel, termo) || contem(e.observacoes, termo)
            ).map(e => ({
                id: e.id,
                titulo: e.nome || 'Empresa',
                sub: `${e.tipo || '—'} · ${e.estado || '—'} · EIN: ${e.ein || '—'}`,
                badge: { texto: e.status?.split(' ')[0] || 'Empresa', cor: '#263238', bg: '#eceff1' },
                link: `GT_Smart_Detalhe_Empresa.html?id=${e.id}`
            }));

            // Contratos
            resultados.contratos = (dados.contratos || []).filter(c =>
                contem(c.clientName, termo) || contem(c.title, termo) ||
                contem(c.description, termo) || contem(c.id, termo)
            ).map(c => ({
                id: c.id,
                titulo: c.title || c.clientName || 'Contrato',
                sub: `Cliente: ${c.clientName || '—'} · ${c.status || '—'}`,
                badge: { texto: 'Contrato', cor: '#0277bd', bg: '#e3f2fd' },
                link: `GT_Smart_Historico_Contratos.html`
            }));

            // DeFi Pools
            resultados.defiPools = (dados.defiPools || []).filter(p =>
                contem(p.nome, termo) || contem(p.tokenA, termo) ||
                contem(p.tokenB, termo) || contem(p.symbolA, termo) ||
                contem(p.symbolB, termo) || contem(p.protocolo, termo) ||
                contem(p.chain, termo) || contem(p.observacoes, termo)
            ).map(p => ({
                id: p.id,
                titulo: p.nome || `${p.symbolA}/${p.symbolB}`,
                sub: `${p.protocolo || '—'} · ${p.chain || '—'} · Range: $${p.rangeMin}–$${p.rangeMax}`,
                badge: p.status === 'ativo' ? { texto: 'Ativo', cor: '#1b5e20', bg: '#e8f5e9' } : { texto: p.status || '—', cor: '#555', bg: '#f5f5f5' },
                link: `GT_Smart_DeFi_Pools.html`
            }));

            // DeFi Borrows
            resultados.defiBorrows = (dados.defiBorrows || []).filter(b =>
                contem(b.cryptoId, termo) || contem(b.cryptoSymbol, termo) ||
                contem(b.cryptoName, termo) || contem(b.protocol, termo) ||
                contem(b.chain, termo)
            ).map(b => ({
                id: b.id,
                titulo: `${(b.cryptoSymbol || b.cryptoId || '').toUpperCase()} — ${b.amount || 0} unidades`,
                sub: `${b.protocol || '—'} · ${b.chain || '—'} · Taxa: ${b.rate || '—'}%`,
                badge: { texto: 'Borrow', cor: '#b71c1c', bg: '#fdecea' },
                link: `GT_Smart_DeFi_Borrows.html`
            }));

            // DeFi Colateral
            resultados.defiColateral = (dados.defiColateral || []).filter(c =>
                contem(c.cryptoId, termo) || contem(c.symbol, termo) ||
                contem(c.protocolo, termo) || contem(c.chain, termo)
            ).map(c => ({
                id: c.id,
                titulo: `${(c.symbol || c.cryptoId || '').toUpperCase()} — ${c.quantidade || 0} unidades`,
                sub: `${c.protocolo || '—'} · ${c.chain || '—'} · LTV: ${c.ltv || '—'}%`,
                badge: { texto: 'Colateral', cor: '#0d47a1', bg: '#e3f2fd' },
                link: `GT_Smart_DeFi_Colateral.html`
            }));

            // LL Compradores
            resultados.llBuyers = (dados.llBuyers || []).filter(b =>
                contem(b.nome, termo) || contem(b.email, termo) ||
                contem(b.telefone, termo) || contem(b.localizacao, termo) ||
                contem(b.observacoes, termo)
            ).map(b => ({
                id: b.id,
                titulo: b.nome || 'Comprador',
                sub: `${b.email || '—'} · ${b.localizacao || '—'} · ${b.status || '—'}`,
                badge: { texto: b.status || 'Buyer', cor: '#1565c0', bg: '#e3f2fd' },
                link: `LL_Buyers.html`
            }));

            // LL Contratos
            resultados.llContracts = (dados.llContracts || []).filter(c =>
                contem(c.propertyAddress, termo) || contem(c.buyerName, termo) ||
                contem(c.sellerName, termo) || contem(c.tipo, termo) || contem(c.id, termo)
            ).map(c => ({
                id: c.id,
                titulo: c.propertyAddress || 'Contrato LL',
                sub: `Comprador: ${c.buyerName || '—'} · Tipo: ${c.tipo || '—'}`,
                badge: { texto: c.tipo || 'Contrato', cor: '#1565c0', bg: '#e3f2fd' },
                link: `LL_Contracts.html`
            }));

            // LL Propriedades
            resultados.llProperties = (dados.llProperties || []).filter(p =>
                contem(p.endereco, termo) || contem(p.address, termo) ||
                contem(p.cidade, termo) || contem(p.estado, termo) ||
                contem(p.tipo, termo) || contem(p.descricao, termo)
            ).map(p => ({
                id: p.id,
                titulo: p.endereco || p.address || 'Propriedade',
                sub: `${p.cidade || '—'}, ${p.estado || '—'} · ${p.tipo || '—'}`,
                badge: { texto: p.tipo || 'Imóvel', cor: '#1565c0', bg: '#e3f2fd' },
                link: `LL_Properties.html`
            }));

            return resultados;
        }

        window.executarBusca = async function() {
            const termo = document.getElementById('campoBusca').value.trim();
            if (!termo || termo.length < 2) {
                alert('Digite pelo menos 2 caracteres para buscar.');
                return;
            }

            termoBuscado = termo;
            document.getElementById('estadoInicial').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultados').innerHTML = '';
            document.getElementById('resumo').style.display = 'none';

            try {
                const dados = await carregarDados();
                const resultados = buscarEm(dados, termo);
                renderResultados(resultados, termo);
            } catch(err) {
                console.error('Erro na busca:', err);
                document.getElementById('resultados').innerHTML = '<div class="sem-resultado"><div class="icone">❌</div><p>Erro ao buscar. Tente novamente.</p></div>';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        };

        function renderResultados(resultados, termo) {
            const modulosVisiveis = FILTRO_MAP[filtroAtivo] || Object.keys(MODULOS);
            let totalGeral = 0;
            let html = '';

            for (const chave of modulosVisiveis) {
                const itens = resultados[chave] || [];
                if (!itens.length) continue;
                totalGeral += itens.length;

                const mod = MODULOS[chave];
                html += `
                    <div class="grupo">
                        <div class="grupo-header" style="background:${mod.cor};">
                            ${mod.emoji} ${mod.label}
                            <span class="grupo-count">${itens.length} resultado${itens.length > 1 ? 's' : ''}</span>
                        </div>
                        ${itens.map(item => `
                            <div class="resultado-item" onclick="window.location.href='${item.link}'">
                                <div class="resultado-info">
                                    <div class="resultado-titulo">${highlight(item.titulo, termo)}</div>
                                    <div class="resultado-sub">${highlight(item.sub, termo)}</div>
                                </div>
                                <span class="resultado-badge" style="background:${item.badge.bg};color:${item.badge.cor};">${item.badge.texto}</span>
                                <span class="resultado-seta">›</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if (!totalGeral) {
                document.getElementById('resultados').innerHTML = `
                    <div class="sem-resultado">
                        <div class="icone">🔍</div>
                        <p>Nenhum resultado para <strong>"${termo}"</strong><br>Tente outro termo ou verifique o filtro selecionado.</p>
                    </div>`;
                return;
            }

            const resumoEl = document.getElementById('resumo');
            resumoEl.style.display = 'block';
            resumoEl.innerHTML = `<strong>${totalGeral} resultado${totalGeral > 1 ? 's' : ''}</strong> encontrado${totalGeral > 1 ? 's' : ''} para "<strong>${termo}</strong>"`;

            document.getElementById('resultados').innerHTML = html;
        }

        window.toggleFiltro = function(btn) {
            document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
            filtroAtivo = btn.dataset.modulo;
            if (termoBuscado) {
                executarBusca();
            }
        };

        window.limparBusca = function() {
            document.getElementById('campoBusca').value = '';
            document.getElementById('resultados').innerHTML = '';
            document.getElementById('resumo').style.display = 'none';
            document.getElementById('estadoInicial').style.display = 'block';
            termoBuscado = '';
            todosOsDados = null; // força recarregar na próxima busca
        };
    </script>
</body>
</html>
