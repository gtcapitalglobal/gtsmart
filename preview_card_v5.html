<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Card - Real Assets LLC</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f0eef5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 420px;
            max-width: 100%;
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 
                0 4px 6px rgba(100, 44, 187, 0.06),
                0 20px 50px rgba(100, 44, 187, 0.12),
                0 0 0 1px rgba(100, 44, 187, 0.08);
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, #6d28d9, #8b5cf6, #6d28d9);
        }

        .card-header {
            padding: 28px 28px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .zelle-logo img { height: 40px; object-fit: contain; }
        .bank-logo img { height: 48px; object-fit: contain; }

        .company-section {
            text-align: center;
            padding: 16px 28px 10px;
        }

        .company-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f5f3ff;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #6d28d9;
            font-weight: 600;
        }

        .company-name {
            font-size: 22px;
            font-weight: 700;
            color: #1e1b3a;
            letter-spacing: -0.3px;
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 28px 14px;
        }

        .qr-frame {
            border: 3px solid #6d28d9;
            border-radius: 20px;
            padding: 12px;
            background: white;
            box-shadow: 0 4px 20px rgba(109, 40, 217, 0.1);
        }

        .qr-frame img {
            width: 180px;
            height: 180px;
            display: block;
            border-radius: 8px;
            object-fit: cover;
        }

        .scan-label {
            margin-top: 10px;
            font-size: 11px;
            color: #9ca3af;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .phone-section {
            text-align: center;
            padding: 4px 28px 16px;
        }

        .phone-number {
            font-family: 'Space Mono', monospace;
            font-size: 32px;
            font-weight: 700;
            color: #1e1b3a;
            letter-spacing: 1px;
        }

        .phone-tag {
            margin-top: 8px;
            font-size: 13px;
            color: #6b7280;
        }

        .tag {
            display: inline-block;
            background: linear-gradient(135deg, #6d28d9, #8b5cf6);
            color: white;
            padding: 3px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
        }

        .divider {
            margin: 4px 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e5e7eb, transparent);
        }

        .divider-text {
            font-size: 11px;
            font-weight: 700;
            color: #6d28d9;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .wire-section { padding: 16px 28px 28px; }

        .wire-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        .wire-row:last-child { border-bottom: none; }

        .wire-label {
            font-size: 12px;
            color: #9ca3af;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .wire-value {
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            color: #1e1b3a;
            text-align: right;
        }

        .wire-value.address {
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
        }

        .card-footer {
            background: #faf9fe;
            padding: 14px 28px;
            text-align: center;
            border-top: 1px solid #f0eef5;
        }

        .card-footer p { font-size: 11px; color: #9ca3af; font-weight: 500; }

        .secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #22c55e;
            font-size: 11px;
            font-weight: 600;
        }
        .secure-badge svg { width: 12px; height: 12px; }

        /* Dark Mode */
        .card.dark {
            background: linear-gradient(170deg, #1e1b3a 0%, #2d2654 50%, #1e1b3a 100%);
            box-shadow: 0 4px 6px rgba(0,0,0,0.15), 0 20px 50px rgba(0,0,0,0.3), 0 0 0 1px rgba(139,92,246,0.2);
        }
        .card.dark::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa, #8b5cf6); }
        .card.dark .company-name { color: #fff; }
        .card.dark .company-badge { background: rgba(139,92,246,0.15); color: #a78bfa; }
        .card.dark .qr-frame { background: #fff; border-color: #8b5cf6; }
        .card.dark .phone-number { color: #fff; }
        .card.dark .phone-tag { color: #9ca3af; }
        .card.dark .divider-line { background: linear-gradient(90deg, transparent, #4a4568, transparent); }
        .card.dark .divider-text { color: #a78bfa; }
        .card.dark .wire-row { border-bottom-color: rgba(255,255,255,0.06); }
        .card.dark .wire-label { color: #8b8a9e; }
        .card.dark .wire-value { color: #e5e7eb; }
        .card.dark .card-footer { background: rgba(0,0,0,0.15); border-top-color: rgba(255,255,255,0.05); }
        .card.dark .card-footer p { color: #6b6988; }
        .card.dark .zelle-logo img { filter: brightness(0) invert(1) brightness(0.85) sepia(1) saturate(3) hue-rotate(230deg); }

        .theme-toggle {
            position: fixed;
            top: 20px; right: 20px;
            display: flex; align-items: center; gap: 8px;
            background: white;
            padding: 8px 16px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 100;
            font-size: 13px;
            font-weight: 600;
            color: #1e1b3a;
            user-select: none;
            font-family: 'DM Sans', sans-serif;
        }
        .theme-toggle:hover { transform: scale(1.03); }

        @media (max-width: 460px) {
            .card { border-radius: 20px; }
            .card-header, .company-section, .qr-section, .phone-section, .wire-section { padding-left: 22px; padding-right: 22px; }
            .divider { margin-left: 22px; margin-right: 22px; }
            .card-footer { padding: 12px 22px; }
            .company-name { font-size: 19px; }
            .qr-frame img { width: 150px; height: 150px; }
            .phone-number { font-size: 26px; }
        }

        @media print {
            body { background: white; }
            .theme-toggle { display: none; }
        }
    </style>
</head>
<body>

    <div class="theme-toggle" onclick="toggleTheme()">
        <span id="themeIcon">🌙</span> <span id="themeLabel">Dark Mode</span>
    </div>

    <div class="card" id="paymentCard">
        <div class="card-header">
            <div class="zelle-logo">
                <img src="Logo_Zelle.png" alt="Zelle">
            </div>
            <div class="bank-logo">
                <img src="Logo_BoA.png" alt="Bank of America">
            </div>
        </div>

        <div class="company-section">
            <div class="company-badge">🏢 Verified Business</div>
            <div class="company-name">Real Assets LLC</div>
        </div>

        <div class="qr-section">
            <div class="qr-frame">
                <img src="qr_code.jpeg" alt="QR Code Zelle">
            </div>
            <div class="scan-label">Scan to pay via Zelle</div>
        </div>

        <div class="phone-section">
            <div class="phone-number">754-302-2072</div>
            <div class="phone-tag">
                Tag: <span class="tag">@gtlands</span>
            </div>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">Wire Transfer</div>
            <div class="divider-line"></div>
        </div>

        <div class="wire-section">
            <div class="wire-row">
                <span class="wire-label">Account Number</span>
                <span class="wire-value">898162799283</span>
            </div>
            <div class="wire-row">
                <span class="wire-label">Routing Number</span>
                <span class="wire-value">026009593</span>
            </div>
            <div class="wire-row">
                <span class="wire-label">Bank Address</span>
                <span class="wire-value address">222 Broadway, New York, NY 10038</span>
            </div>
        </div>

        <div class="card-footer">
            <p>
                <span class="secure-badge">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
                    Secure Payment
                </span>
                &nbsp;•&nbsp; Payments processed by Bank of America
            </p>
        </div>
    </div>

    <script>
        let isDark = false;
        function toggleTheme() {
            isDark = !isDark;
            document.getElementById('paymentCard').classList.toggle('dark', isDark);
            document.body.style.background = isDark ? '#0f0e1a' : '#f0eef5';
            document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
            document.getElementById('themeLabel').textContent = isDark ? 'Light Mode' : 'Dark Mode';
        }
    </script>
</body>
</html>
