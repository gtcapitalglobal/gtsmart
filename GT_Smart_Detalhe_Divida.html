<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT Smart - Detalhes da Dívida</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            max-width: 900px;
            margin: 5px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 { font-size: 18px; }
        .btn-back {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            text-decoration: none;
        }
        .content { padding: 15px 20px; }
        .summary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .summary-item { font-size: 11px; margin-bottom: 6px; }
        .summary-value { font-size: 16px; font-weight: 700; margin-top: 2px; }
        .progress-section {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 8px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745 0%, #20c997 100%);
        }
        .progress-text {
            font-size: 11px;
            color: #666;
            text-align: center;
        }
        .payments-list {
            max-height: 500px;
            overflow-y: auto;
        }
        .payment-item {
            background: #f8f9fa;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #e0e0e0;
        }
        .payment-item.paid {
            background: #d4edda;
            border-left-color: #28a745;
        }
        .payment-item.late {
            background: #f8d7da;
            border-left-color: #dc3545;
        }
        .payment-info { flex: 1; }
        .payment-number {
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }
        .payment-date {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }
        .payment-amount {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-right: 10px;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
        }
        .checkbox-container input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
        }
        .late-badge {
            background: #dc3545;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            margin-left: 8px;
        }
        .paid-badge {
            background: #28a745;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            margin-left: 8px;
        }
    
        /* Dark Mode */
        body.dark-mode { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        body.dark-mode .container { background: #0f0f23; color: #e0e0e0; }
        body.dark-mode .header { }
        body.dark-mode .content { color: #e0e0e0; }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea { background: #16213e; color: #e0e0e0; border-color: #333; }
        body.dark-mode .card-item, body.dark-mode .summary-card { border-color: #333; }
    
        @media (max-width: 600px) {
            .summary-grid { grid-template-columns: repeat(2, 1fr) !important; }
            .cards-grid { grid-template-columns: 1fr !important; }
            .header { flex-direction: column; text-align: center; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 id="debtTitle">💳 Detalhes da Dívida</h2>
            <div style="display:flex;gap:8px;align-items:center;">
                <button onclick="editarDivida()" style="background:#667eea;color:white;border:none;padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer;">✏️ Editar</button>
                <button onclick="excluirDivida()" style="background:#e74c3c;color:white;border:none;padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer;">🗑️ Excluir</button>
                <a href="GT_Smart_Minhas_Dividas.html" class="btn-back">← Voltar</a>
            </div>
        </div>
        
        <div class="content">
            <div class="summary" id="summary"></div>
            
            <div class="progress-section">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText"></div>
            </div>
            
            <h3 style="margin-bottom: 15px; color: #333;">📋 Parcelas</h3>
            <div class="payments-list" id="paymentsList"></div>
        </div>
    </div>
    
    <script type="module">
        // Dark mode
import { auth, onAuthStateChanged, getDebts, updateDebt, deleteDebt } from './firebase-config.js';
        
        let debt = null;
        
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'GT_Smart_Login.html'; return; }
            const urlParams = new URLSearchParams(window.location.search);
            const debtId = urlParams.get('id');
            
            if (!debtId) {
                alert('❌ Dívida não encontrada!');
                window.location.href = 'GT_Smart_Minhas_Dividas.html';
                return;
            }
            
            await loadDebt(debtId);
            if (debt) {
                renderSummary();
                renderPayments();
            }
        });
        
        async function loadDebt(id) {
            const debts = await getDebts();
            debt = debts.find(d => d.id === id);
            
            if (!debt) {
                alert('❌ Dívida não encontrada!');
                window.location.href = 'GT_Smart_Minhas_Dividas.html';
            }
        }
        
        function renderSummary() {
            document.getElementById('debtTitle').textContent = `💳 ${debt.creditorName}`;
            
            const totalPaid = debt.payments.filter(p => p.paid).reduce((sum, p) => sum + p.amount, 0);
            const totalPending = debt.payments.filter(p => !p.paid).reduce((sum, p) => sum + p.amount, 0);
            
            const formatCurrency = (value) => {
                return new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD'
                }).format(value);
            };
            
            const formatDateBR = (dateStr) => {
                if (!dateStr) return '';
                const parts = dateStr.split('T')[0].split('-');
                if (parts.length === 3) {
                    return `${parts[2]}/${parts[1]}/${parts[0]}`;
                }
                return dateStr;
            };
            
            document.getElementById('summary').innerHTML = `
                <h3 style="margin-bottom: 10px;">🏦 ${debt.creditorName}</h3>
                <div class="summary-grid">
                    <div class="summary-item">
                        <div>Valor Total</div>
                        <div class="summary-value">${formatCurrency(debt.totalAmount)}</div>
                    </div>
                    <div class="summary-item">
                        <div>Parcelas</div>
                        <div class="summary-value">${debt.numPayments}× ${formatCurrency(debt.paymentAmount)}</div>
                    </div>
                    <div class="summary-item">
                        <div>Já Pago</div>
                        <div class="summary-value">${formatCurrency(totalPaid)}</div>
                    </div>
                    <div class="summary-item">
                        <div>A Pagar</div>
                        <div class="summary-value">${formatCurrency(totalPending)}</div>
                    </div>
                </div>
            `;
            
            const paidCount = debt.payments.filter(p => p.paid).length;
            const progress = (paidCount / debt.payments.length) * 100;
            
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `${paidCount} de ${debt.payments.length} parcelas pagas (${progress.toFixed(0)}%)`;
        }
        
        function renderPayments() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const formatCurrency = (value) => {
                return new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD'
                }).format(value);
            };
            
            const formatDateBR = (dateStr) => {
                if (!dateStr) return '';
                const parts = dateStr.split('T')[0].split('-');
                if (parts.length === 3) {
                    return `${parts[2]}/${parts[1]}/${parts[0]}`;
                }
                return dateStr;
            };
            
            const parseLocalDate = (ds) => { if(!ds) return new Date(); const p=ds.split('T')[0].split('-'); const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])); d.setHours(0,0,0,0); return d; };
            
            const html = debt.payments.map((payment, index) => {
                const paymentDate = parseLocalDate(payment.date);
                
                let itemClass = '';
                let badge = '';
                
                if (payment.paid) {
                    itemClass = 'paid';
                    badge = '<span class="paid-badge">PAGO</span>';
                } else if (paymentDate < today) {
                    itemClass = 'late';
                    badge = '<span class="late-badge">ATRASADO</span>';
                }
                
                return `
                    <div class="payment-item ${itemClass}">
                        <div class="payment-info">
                            <div class="payment-number">#${payment.number} - ${formatDateBR(payment.date)} ${badge}</div>
                            ${payment.paid ? `<div class="payment-date">Pago em: ${formatDateBR(payment.paidDate)}</div>` : ''}
                        </div>
                        <div class="payment-amount">${formatCurrency(payment.amount)}</div>
                        <div class="checkbox-container">
                            <input type="checkbox" ${payment.paid ? 'checked' : ''} 
                                   onchange="togglePayment(${index})" 
                                   title="${payment.paid ? 'Marcar como não pago' : 'Marcar como pago'}">
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('paymentsList').innerHTML = html;
        }
        
        window.editarDivida = function() {
            if (!debt) return;
            window.location.href = 'GT_Smart_Editar_Divida.html?id=' + debt.id;
        };
        
        window.excluirDivida = async function() {
            if (!debt) return;
            if (!confirm('⚠️ Tem certeza que quer excluir esta dívida? Esta ação não pode ser desfeita!')) return;
            const ok = await deleteDebt(debt.id);
            if (ok) {
                alert('✅ Dívida excluída com sucesso!');
                window.location.href = 'GT_Smart_Minhas_Dividas.html';
            } else {
                alert('❌ Erro ao excluir. Tente novamente.');
            }
        };
        
        window.togglePayment = async function togglePayment(index) {
            const payment = debt.payments[index];
            
            if (payment.paid) {
                payment.paid = false;
                payment.paidDate = null;
            } else {
                payment.paid = true;
                payment.paidDate = new Date().toISOString().split('T')[0];
            }
            
            const paidCount = debt.payments.filter(p => p.paid).length;
            if (paidCount === debt.payments.length) {
                debt.status = 'finished';
            } else {
                debt.status = 'active';
            }
            
            await updateDebt(debt.id, debt);
            
            renderSummary();
            renderPayments();
        }
    </script>
<a href="GT_Smart_Menu.html" style="position:fixed;bottom:20px;right:20px;background:#667eea;color:white;padding:10px 18px;border-radius:25px;text-decoration:none;font-weight:700;font-size:13px;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:999;">🏠 Menu</a>

    <p style="text-align:center;font-size:11px;opacity:0.5;padding:10px;">Basic 2.0 | 06/03/2026</p>
</body>
</html>
