<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT Smart - Corrigir % Borrows</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a237e, #283593); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .box { background: white; border-radius: 16px; padding: 30px; max-width: 560px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h2 { font-size: 20px; color: #1a237e; margin-bottom: 6px; }
        .sub { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.6; }
        .log { background: #f5f5f5; border-radius: 10px; padding: 14px; font-size: 12px; color: #333; max-height: 350px; overflow-y: auto; line-height: 2; }
        .ok    { color: #2e7d32; }
        .skip  { color: #888; }
        .erro  { color: #c62828; }
        .info  { color: #1565c0; font-weight: 700; }
        .btn   { display: none; width: 100%; margin-top: 16px; padding: 14px; background: #2e7d32; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; text-decoration: none; text-align: center; }
        .btn-pools { display: none; width: 100%; margin-top: 8px; padding: 14px; background: #1a237e; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; text-decoration: none; text-align: center; }
    </style>
</head>
<body>
<div class="box">
    <h2>🔧 Corrigir % dos Borrows</h2>
    <p class="sub">Esta página verifica todas as suas pools, detecta % salvos incorretamente (formato antigo) e corrige automaticamente. Use apenas uma vez.</p>
    <div class="log" id="log">⏳ Aguardando autenticação...</div>
    <a href="GT_Smart_DeFi_Pools.html" class="btn" id="btnPools">✅ Ver DeFi Pools</a>
</div>

<script type="module">
import { auth, onAuthStateChanged, db } from './firebase-config.js';
import { collection, getDocs, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const logEl = document.getElementById('log');
function log(msg, tipo) {
    logEl.innerHTML += '<div class="' + (tipo||'') + '">' + msg + '</div>';
    logEl.scrollTop = logEl.scrollHeight;
}

onAuthStateChanged(auth, async (user) => {
    if (!user) { log('❌ Não autenticado. Faça login e reabra.', 'erro'); return; }

    log('<span class="info">✅ Logado: ' + user.email + '</span>');
    log('<span class="info">Carregando pools e borrows...</span>');
    log('');

    try {
        // Carregar pools
        const poolsSnap = await getDocs(collection(db, 'users', user.uid, 'defi_pools'));
        const pools = poolsSnap.docs.map(d => ({ ...d.data(), id: d.id }));

        // Carregar borrows
        const borrowsSnap = await getDocs(collection(db, 'users', user.uid, 'defi_borrows'));
        const borrows = borrowsSnap.docs.map(d => ({ ...d.data(), id: d.id }));

        log('<span class="info">Encontradas: ' + pools.length + ' pools | ' + borrows.length + ' borrows</span>');
        log('');

        let corrigidas = 0;
        let ok_count = 0;
        let sem_borrow = 0;

        for (const p of pools) {
            const name = p.poolName || p.id;
            let updates = {};
            let msgs = [];

            for (const side of ['A', 'B']) {
                const borrowId = p['borrowId' + side];
                if (!borrowId) continue;

                const borrow = borrows.find(b => b.id === borrowId);
                if (!borrow) { msgs.push('⚠️ Borrow ' + side + ' não encontrado'); continue; }

                const total = parseFloat(borrow.amount || 0);
                const savedPct = parseFloat(p['borrowPct' + side] || 0);
                const savedQty = parseFloat(p['borrowQty' + side] || 0);

                // Detectar se % está errado (> 100 = era quantidade)
                if (savedPct > 100) {
                    // Dado antigo: savedPct era na verdade a quantidade
                    const correctPct = total > 0 ? (savedPct / total) * 100 : 0;
                    const correctQty = savedPct; // o que estava em pct era qty
                    updates['borrowPct' + side] = parseFloat(correctPct.toFixed(4));
                    updates['borrowQty' + side] = correctQty;
                    msgs.push('🔧 Side ' + side + ': ' + savedPct.toFixed(2) + ' (era qty) → ' + correctPct.toFixed(2) + '%');
                } else if (savedPct > 0 && savedPct <= 100 && savedQty === 0) {
                    // Pct correto mas qty não calculado — calcular e salvar
                    const correctQty = (savedPct / 100) * total;
                    updates['borrowQty' + side] = parseFloat(correctQty.toFixed(6));
                    msgs.push('✏️ Side ' + side + ': ' + savedPct.toFixed(2) + '% → qty calculado: ' + correctQty.toFixed(4));
                } else if (savedPct > 0 && savedPct <= 100) {
                    msgs.push('✅ Side ' + side + ': ' + savedPct.toFixed(2) + '% (correto)');
                } else {
                    msgs.push('— Side ' + side + ': sem % definido');
                }
            }

            if (Object.keys(updates).length > 0) {
                try {
                    await updateDoc(doc(db, 'users', user.uid, 'defi_pools', p.id), updates);
                    log('✅ <strong>' + name + '</strong> corrigida:', 'ok');
                    msgs.forEach(m => log('&nbsp;&nbsp;&nbsp;' + m));
                    corrigidas++;
                } catch(e) {
                    log('❌ Erro ao corrigir ' + name + ': ' + e.message, 'erro');
                }
            } else {
                const hasBorrow = ['A','B'].some(s => p['borrowId'+s]);
                if (hasBorrow) {
                    log('<span class="skip">— ' + name + ': já estava correto</span>');
                    ok_count++;
                } else {
                    sem_borrow++;
                }
            }
            await new Promise(r => setTimeout(r, 80));
        }

        log('');
        log('<span class="info">══════════════════════════════</span>');
        log('<span class="info">🔧 Corrigidas: ' + corrigidas + ' &nbsp;|&nbsp; ✅ Já ok: ' + ok_count + ' &nbsp;|&nbsp; — Sem borrow: ' + sem_borrow + '</span>');
        log('<span class="info">══════════════════════════════</span>');

        document.getElementById('btnPools').style.display = 'block';

    } catch(e) {
        log('❌ Erro geral: ' + e.message, 'erro');
    }
});
</script>
</body>
</html>
