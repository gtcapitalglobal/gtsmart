<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledgerlands — Parcelas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1565c0 0%, #0288d1 100%); min-height: 100vh; padding: 15px; }
        .container { max-width: 1100px; margin: 5px auto; background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #1565c0, #0288d1); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .header h2 { font-size: 18px; font-weight: 800; }
        .header-right { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .btn-back { background: rgba(255,255,255,0.2); color: white; border: 2px solid white; padding: 7px 13px; border-radius: 6px; font-weight: 600; font-size: 13px; text-decoration: none; }
        .content { padding: 15px 20px; }
        .version { font-size: 10px; opacity: 0.5; text-align: right; padding: 4px 20px 8px; }

        /* Summary */
        .sum-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
        .sum-card { border-radius: 10px; padding: 12px; text-align: center; }
        .sum-card .lbl { font-size: 10px; font-weight: 700; opacity: 0.8; margin-bottom: 3px; text-transform: uppercase; }
        .sum-card .val { font-size: 20px; font-weight: 800; }
        .sc-red { background: #fdecea; color: #c62828; }
        .sc-orange { background: #fff3e0; color: #e65100; }
        .sc-blue { background: #e3f2fd; color: #1565c0; }
        .sc-green { background: #e8f5e9; color: #2e7d32; }

        /* Filters */
        .filtros { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 1; min-width: 180px; padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 13px; outline: none; }
        .search-box:focus { border-color: #1565c0; }
        .filter-btn { padding: 7px 14px; border-radius: 20px; border: 2px solid #ddd; background: white; font-size: 12px; font-weight: 700; cursor: pointer; color: #555; white-space: nowrap; }
        .filter-btn.active { background: #1565c0; color: white; border-color: #1565c0; }

        /* Table */
        .tbl-wrap { overflow-x: auto; }
        .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
        .tbl th { background: #f5f5f5; padding: 9px 10px; text-align: left; font-size: 11px; font-weight: 800; color: #666; text-transform: uppercase; white-space: nowrap; }
        .tbl td { padding: 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        .tbl tr:last-child td { border-bottom: none; }
        .tbl tr.row-overdue td { background: #fff8f8; }
        .tbl tr.row-paid td { background: #f9fff9; opacity: 0.7; }
        .tbl tr:hover td { background: #f5f5f5 !important; }

        .badge { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 700; }
        .badge-red { background: #fdecea; color: #c62828; }
        .badge-orange { background: #fff3e0; color: #e65100; }
        .badge-blue { background: #e3f2fd; color: #1565c0; }
        .badge-green { background: #e8f5e9; color: #2e7d32; }
        .badge-grey { background: #f5f5f5; color: #777; }
        .badge-purple { background: #f3e5f5; color: #7b1fa2; }

        .btn-pagar { background: #2e7d32; color: white; border: none; padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
        .btn-pagar:hover { background: #1b5e20; }
        .btn-despagar { background: #fff3e0; color: #e65100; border: 1px solid #e65100; padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 15px; }
        .modal.open { display: flex; }
        .modal-box { background: white; border-radius: 12px; padding: 20px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-title { font-size: 16px; font-weight: 800; color: #333; margin-bottom: 16px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: #666; margin-bottom: 4px; text-transform: uppercase; }
        .form-group input, .form-group select { width: 100%; padding: 9px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 13px; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: #1565c0; }
        .modal-footer { display: flex; gap: 8px; margin-top: 16px; }
        .btn-salvar { flex: 1; background: #1565c0; color: white; border: none; padding: 11px; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; }
        .btn-cancelar { background: #f5f5f5; color: #555; border: none; padding: 11px 18px; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; }

        .empty { text-align: center; color: #aaa; padding: 30px; font-size: 14px; }

        @media (max-width: 600px) {
            .sum-grid { grid-template-columns: repeat(2, 1fr) !important; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>📅 Parcelas — Cronograma</h2>
        <div class="header-right">
            <a href="LL_Menu.html" class="btn-back">← Voltar</a>
        </div>
    </div>

    <div class="content">
        <!-- Summary -->
        <div class="sum-grid">
            <div class="sum-card sc-red">
                <div class="lbl">Vencidas</div>
                <div class="val" id="sumVencidas">—</div>
            </div>
            <div class="sum-card sc-orange">
                <div class="lbl">Vencendo (30d)</div>
                <div class="val" id="sumProx30">—</div>
            </div>
            <div class="sum-card sc-blue">
                <div class="lbl">Pendentes Total</div>
                <div class="val" id="sumPendentes">—</div>
            </div>
            <div class="sum-card sc-green">
                <div class="lbl">Pagas</div>
                <div class="val" id="sumPagas">—</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filtros">
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 Buscar imóvel ou comprador..." oninput="filtrar()">
            <button class="filter-btn active" id="fTodas" onclick="setFiltro('todas')">Todas</button>
            <button class="filter-btn" id="fVencidas" onclick="setFiltro('vencidas')">🚨 Vencidas</button>
            <button class="filter-btn" id="fProx30" onclick="setFiltro('prox30')">⏰ 30 dias</button>
            <button class="filter-btn" id="fProx90" onclick="setFiltro('prox90')">📆 90 dias</button>
            <button class="filter-btn" id="fPagas" onclick="setFiltro('pagas')">✅ Pagas</button>
        </div>

        <!-- Table -->
        <div class="tbl-wrap">
            <table class="tbl">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Imóvel</th>
                        <th>Comprador</th>
                        <th>Tipo</th>
                        <th>Vencimento</th>
                        <th>Valor</th>
                        <th>Status</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
        <div class="empty" id="emptyMsg" style="display:none;">Nenhuma parcela encontrada.</div>
    </div>
    <div class="version">Basic 1.0 | 11/03/2026</div>
</div>

<!-- Modal Pagar -->
<div class="modal" id="modalPagar">
    <div class="modal-box">
        <div class="modal-title">✅ Registrar Pagamento</div>
        <div id="modalInfoParcela" style="background:#f5f5f5;border-radius:8px;padding:10px;margin-bottom:14px;font-size:13px;color:#555;"></div>
        <input type="hidden" id="mpId">
        <div class="form-group">
            <label>Data do Pagamento</label>
            <input type="date" id="mpData">
        </div>
        <div class="form-group">
            <label>Valor Pago</label>
            <input type="number" id="mpValor" step="0.01" placeholder="0.00">
        </div>
        <div class="modal-footer">
            <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
            <button class="btn-salvar" onclick="confirmarPagar()">✅ Confirmar</button>
        </div>
    </div>
</div>

<a href="LL_Menu.html" style="position:fixed;bottom:20px;right:20px;background:#1565c0;color:white;padding:10px 18px;border-radius:25px;text-decoration:none;font-weight:700;font-size:13px;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:999;">🏠 Menu</a>

<script type="module">
    import { auth, onAuthStateChanged, getLLInstallments, getLLContracts, updateLLInstallment } from './firebase-config.js';

    const fmt2 = v => '$' + parseFloat(v || 0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    const fmtData = d => d ? new Date(d + 'T12:00:00').toLocaleDateString('pt-BR') : '—';

    let parcelas = [], contratos = [], filtroAtivo = 'todas', searchTerm = '';

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'GT_Smart_Login.html'; return; }
        [parcelas, contratos] = await Promise.all([getLLInstallments(), getLLContracts()]);
        renderSummary();
        renderTabela();
    });

    function renderSummary() {
        const hoje = new Date();
        const vencidas = parcelas.filter(p => p.status !== 'PAID' && new Date((p.dueDate || '') + 'T12:00:00') < hoje).length;
        const prox30 = parcelas.filter(p => {
            if (p.status === 'PAID') return false;
            const d = new Date((p.dueDate || '') + 'T12:00:00');
            const dias = Math.floor((d - hoje) / 86400000);
            return dias >= 0 && dias <= 30;
        }).length;
        const pendentes = parcelas.filter(p => p.status !== 'PAID').length;
        const pagas = parcelas.filter(p => p.status === 'PAID').length;
        document.getElementById('sumVencidas').textContent = vencidas;
        document.getElementById('sumProx30').textContent = prox30;
        document.getElementById('sumPendentes').textContent = pendentes;
        document.getElementById('sumPagas').textContent = pagas;
    }

    function filtrar() {
        searchTerm = document.getElementById('searchBox').value.toLowerCase();
        renderTabela();
    }

    window.setFiltro = function(f) {
        filtroAtivo = f;
        ['fTodas','fVencidas','fProx30','fProx90','fPagas'].forEach(id => document.getElementById(id).classList.remove('active'));
        const map = { todas:'fTodas', vencidas:'fVencidas', prox30:'fProx30', prox90:'fProx90', pagas:'fPagas' };
        document.getElementById(map[f]).classList.add('active');
        renderTabela();
    };

    function renderTabela() {
        const hoje = new Date();

        let lista = [...parcelas].sort((a, b) => {
            // Sort: overdue first, then by dueDate
            const da = new Date((a.dueDate || '') + 'T12:00:00');
            const db = new Date((b.dueDate || '') + 'T12:00:00');
            if (a.status !== 'PAID' && b.status === 'PAID') return -1;
            if (a.status === 'PAID' && b.status !== 'PAID') return 1;
            return da - db;
        });

        // Apply filter
        if (filtroAtivo === 'vencidas') {
            lista = lista.filter(p => p.status !== 'PAID' && new Date((p.dueDate || '') + 'T12:00:00') < hoje);
        } else if (filtroAtivo === 'prox30') {
            lista = lista.filter(p => {
                if (p.status === 'PAID') return false;
                const d = new Date((p.dueDate || '') + 'T12:00:00');
                const dias = Math.floor((d - hoje) / 86400000);
                return dias >= 0 && dias <= 30;
            });
        } else if (filtroAtivo === 'prox90') {
            lista = lista.filter(p => {
                if (p.status === 'PAID') return false;
                const d = new Date((p.dueDate || '') + 'T12:00:00');
                const dias = Math.floor((d - hoje) / 86400000);
                return dias >= 0 && dias <= 90;
            });
        } else if (filtroAtivo === 'pagas') {
            lista = lista.filter(p => p.status === 'PAID');
        }

        // Search
        if (searchTerm) {
            lista = lista.filter(p => {
                const c = contratos.find(x => x.id === p.contractId) || {};
                return (p.propertyId || '').toLowerCase().includes(searchTerm) ||
                       (c.buyerName || '').toLowerCase().includes(searchTerm);
            });
        }

        const tbody = document.getElementById('tbody');
        const emptyMsg = document.getElementById('emptyMsg');

        if (lista.length === 0) {
            tbody.innerHTML = '';
            emptyMsg.style.display = 'block';
            return;
        }
        emptyMsg.style.display = 'none';

        tbody.innerHTML = lista.map(p => {
            const c = contratos.find(x => x.id === p.contractId) || {};
            const dVenc = new Date((p.dueDate || '') + 'T12:00:00');
            const isOverdue = p.status !== 'PAID' && dVenc < hoje;
            const diasDiff = Math.floor((dVenc - hoje) / 86400000);
            const rowClass = isOverdue ? 'row-overdue' : (p.status === 'PAID' ? 'row-paid' : '');

            // Badge status
            let badge, statusLabel;
            if (p.status === 'PAID') {
                badge = 'green'; statusLabel = '✅ Pago';
            } else if (isOverdue) {
                badge = 'red'; statusLabel = `🚨 Vencida (${Math.abs(diasDiff)}d)`;
            } else if (diasDiff <= 5) {
                badge = 'orange'; statusLabel = `⚠️ ${diasDiff}d`;
            } else if (diasDiff <= 30) {
                badge = 'blue'; statusLabel = `⏰ ${diasDiff}d`;
            } else {
                badge = 'grey'; statusLabel = `📆 ${diasDiff}d`;
            }

            // Tipo badge
            const tipoBadge = p.type === 'BALLOON' ? '<span class="badge badge-purple">🎈 Balloon</span>' :
                              p.type === 'DOWN_PAYMENT' ? '<span class="badge badge-blue">⬇️ Entrada</span>' :
                              '<span class="badge badge-grey">Regular</span>';

            const btnAcao = p.status === 'PAID'
                ? `<button class="btn-despagar" onclick="desfazerPagamento('${p.id}')">↩️ Desfazer</button>`
                : `<button class="btn-pagar" onclick="abrirPagar('${p.id}')">💰 Pagar</button>`;

            return `<tr class="${rowClass}">
                <td style="color:#999;font-size:12px;">${p.installmentNumber || '—'}</td>
                <td><strong>${p.propertyId || c.propertyId || '—'}</strong></td>
                <td style="font-size:12px;">${c.buyerName || '—'}</td>
                <td>${tipoBadge}</td>
                <td>${fmtData(p.dueDate)}</td>
                <td style="font-weight:700;">${fmt2(p.amount)}</td>
                <td><span class="badge badge-${badge}">${statusLabel}</span></td>
                <td>${btnAcao}</td>
            </tr>`;
        }).join('');
    }

    window.abrirPagar = function(id) {
        const p = parcelas.find(x => x.id === id);
        if (!p) return;
        const c = contratos.find(x => x.id === p.contractId) || {};
        document.getElementById('mpId').value = id;
        document.getElementById('mpData').value = new Date().toISOString().split('T')[0];
        document.getElementById('mpValor').value = parseFloat(p.amount || 0).toFixed(2);
        document.getElementById('modalInfoParcela').innerHTML = `
            <strong>${p.propertyId || c.propertyId}</strong> — Parcela #${p.installmentNumber || '—'}<br>
            Comprador: ${c.buyerName || '—'} · Vencimento: ${fmtData(p.dueDate)}
        `;
        document.getElementById('modalPagar').classList.add('open');
    };

    window.confirmarPagar = async function() {
        const id = document.getElementById('mpId').value;
        const data = document.getElementById('mpData').value;
        const valor = parseFloat(document.getElementById('mpValor').value) || 0;
        if (!data || valor <= 0) { alert('❌ Data e valor são obrigatórios!'); return; }

        const ok = await updateLLInstallment(id, { status: 'PAID', paidDate: data, paidAmount: valor });
        if (ok) {
            const idx = parcelas.findIndex(x => x.id === id);
            if (idx >= 0) { parcelas[idx].status = 'PAID'; parcelas[idx].paidDate = data; parcelas[idx].paidAmount = valor; }
            fecharModal();
            renderSummary();
            renderTabela();
        }
    };

    window.desfazerPagamento = async function(id) {
        if (!confirm('Desfazer o pagamento desta parcela?')) return;
        const ok = await updateLLInstallment(id, { status: 'PENDING', paidDate: null, paidAmount: null });
        if (ok) {
            const idx = parcelas.findIndex(x => x.id === id);
            if (idx >= 0) { parcelas[idx].status = 'PENDING'; delete parcelas[idx].paidDate; delete parcelas[idx].paidAmount; }
            renderSummary();
            renderTabela();
        }
    };

    window.fecharModal = function() {
        document.getElementById('modalPagar').classList.remove('open');
    };

    document.getElementById('modalPagar').addEventListener('click', e => {
        if (e.target === document.getElementById('modalPagar')) fecharModal();
    });
</script>
</body>
</html>
