        let statusEl, summaryEl, btnEl;

        window.iniciarSeed = async function() {
            statusEl = document.getElementById('statusArea');
            summaryEl = document.getElementById('summary');
            btnEl = document.getElementById('btnSeed');
            btnEl.disabled = true;
            btnEl.textContent = '⏳ Salvando...';
            statusEl.innerHTML = '';

            let ok = 0, err = 0;

            for (let i = 0; i < cartoes.length; i++) {
                const c = cartoes[i];
                const label = `${c.nome} •••• ${c.ultimos4} (${c.titular})`;
                addLine(label, 'wait', '⏳');

                try {
                    const result = await saveCard(c);
                    if (result) {
                        updateLine(i, label, 'ok', '✅');
                        ok++;
                    } else {
                        updateLine(i, label, 'err', '❌ Erro ao salvar');
                        err++;
                    }
                } catch(e) {
                    updateLine(i, label, 'err', '❌ ' + e.message);
                    err++;
                }
            }

            summaryEl.innerHTML = `✅ ${ok} salvos | ❌ ${err} erros | Total: ${cartoes.length}`;
            summaryEl.style.color = err === 0 ? '#4caf50' : '#ffa726';
            btnEl.textContent = err === 0 ? '✅ Concluído!' : '⚠️ Concluído com erros';
        };

        function addLine(label, cls, status) {
            statusEl.innerHTML += `<div class="card-line ${cls}" id="line-${statusEl.children.length}"><span>${label}</span><span>${status}</span></div>`;
        }

        function updateLine(idx, label, cls, status) {
            const el = document.getElementById('line-' + idx);
            if (el) {
                el.className = 'card-line ' + cls;
                el.innerHTML = `<span>${label}</span><span>${status}</span>`;
            }
        }

        // Verifica auth
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                document.getElementById('statusArea').innerHTML = '<div style="color:#ef5350;text-align:center;font-weight:700;">❌ Você precisa estar logado! Faça login primeiro no GT Smart.</div>';
                document.getElementById('btnSeed').disabled = true;
            } else {
                document.getElementById('statusArea').innerHTML = `<div style="color:#4caf50;text-align:center;">✅ Logado como ${user.email} — Pronto para iniciar!</div>`;
            }
