const log = document.getElementById('log');
const progresso = document.getElementById('progresso');
const progressoFill = document.getElementById('progressoFill');
const progressoTxt = document.getElementById('progressoTxt');

function addLog(msg, tipo='info') {
  log.style.display = 'block';
  const line = document.createElement('div');
  line.className = 'log-' + tipo;
  line.textContent = new Date().toLocaleTimeString('pt-BR') + ' › ' + msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function setProgresso(atual, total, msg) {
  progresso.style.display = 'block';
  const pct = Math.round((atual / total) * 100);
  progressoFill.style.width = pct + '%';
  progressoTxt.textContent = msg + ' (' + atual + '/' + total + ' — ' + pct + '%)';
}

let userId = null;

onAuthStateChanged(auth, (user) => {
  if (!user) {
    document.getElementById('btnImportar').disabled = true;
    document.getElementById('btnImportar').textContent = '🔒 Faça login primeiro em GT_Smart_Login.html';
    addLog('Usuário não autenticado. Faça login primeiro.', 'err');
    log.style.display = 'block';
  } else {
    userId = user.uid;
    addLog('Autenticado como: ' + user.email, 'ok');
    log.style.display = 'block';
  }
});

window.iniciarImportacao = async function() {
  if (!userId) { alert('Você precisa estar logado!'); return; }
  if (!confirm('Confirma a importação de 13 contratos e 111 pagamentos?\n\nATENÇÃO: Execute apenas uma vez!')) return;

  document.getElementById('btnImportar').disabled = true;
  document.getElementById('btnImportar').textContent = '⏳ Importando...';

  let okContratos = 0, errContratos = 0;
  let okPagamentos = 0, errPagamentos = 0;
  const total = DADOS.contracts.length + DADOS.payments.length;
  let feito = 0;

  // Importar contratos
  addLog('--- Iniciando importação de contratos ---', 'info');
  for (const c of DADOS.contracts) {
    try {
      const docId = 'll_contract_' + c.propertyId.replace('#', '');
      const ref = doc(db, 'users', userId, 'll_contracts', docId);
      await setDoc(ref, {
        propertyId: c.propertyId,
        buyerName: (c.buyerName || '').trim(),
        originType: c.originType || 'DIRECT',
        saleType: c.saleType || 'CFD',
        county: c.county || '',
        state: c.state || 'FL',
        contractDate: c.contractDate || null,
        transferDate: c.transferDate || null,
        closeDate: c.closeDate || null,
        contractPrice: parseFloat(c.contractPrice) || 0,
        costBasis: parseFloat(c.costBasis) || 0,
        downPayment: parseFloat(c.downPayment) || 0,
        installmentAmount: parseFloat(c.installmentAmount) || 0,
        installmentCount: parseInt(c.installmentCount) || 0,
        balloonAmount: c.balloonAmount ? parseFloat(c.balloonAmount) : null,
        balloonDate: c.balloonDate || null,
        firstInstallmentDate: c.firstInstallmentDate || null,
        deedStatus: c.deedStatus || 'UNKNOWN',
        deedRecordedDate: c.deedRecordedDate || null,
        status: c.status || 'Active',
        notes: c.notes || '',
        openingReceivable: c.openingReceivable ? parseFloat(c.openingReceivable) : null,
        installmentsPaidByTransfer: c.installmentsPaidByTransfer || null,
        documentFolderLink: c.documentFolderLink || '',
        legacyId: c.id,
        importadoEm: new Date().toISOString()
      });
      okContratos++;
      addLog('✅ Contrato ' + c.propertyId + ' — ' + (c.buyerName||'').trim(), 'ok');
    } catch(e) {
      errContratos++;
      addLog('❌ ERRO contrato ' + c.propertyId + ': ' + e.message, 'err');
    }
    feito++;
    setProgresso(feito, total, 'Contratos');
  }

  // Importar pagamentos
  addLog('--- Iniciando importação de pagamentos ---', 'info');
  // Mapear legacyId -> docId para pagamentos
  const contractDocMap = {};
  for (const c of DADOS.contracts) {
    contractDocMap[c.id] = 'll_contract_' + c.propertyId.replace('#', '');
  }

  for (const p of DADOS.payments) {
    try {
      const docId = 'll_payment_' + p.id;
      const ref = doc(db, 'users', userId, 'll_payments', docId);
      await setDoc(ref, {
        contractId: contractDocMap[p.contractId] || String(p.contractId),
        propertyId: p.propertyId,
        paymentDate: p.paymentDate || null,
        amountTotal: parseFloat(p.amountTotal) || 0,
        principalAmount: parseFloat(p.principalAmount) || 0,
        lateFeeAmount: parseFloat(p.lateFeeAmount) || 0,
        receivedBy: p.receivedBy || 'GT_REAL_BANK',
        channel: p.channel || 'OTHER',
        memo: p.memo || '',
        legacyId: p.id,
        importadoEm: new Date().toISOString()
      });
      okPagamentos++;
    } catch(e) {
      errPagamentos++;
      addLog('❌ ERRO pagamento id ' + p.id + ': ' + e.message, 'err');
    }
    feito++;
    setProgresso(feito, total, 'Pagamentos');
  }

  // Resultado final
  addLog('--- CONCLUÍDO ---', 'info');
  addLog('Contratos: ' + okContratos + ' ok, ' + errContratos + ' erros', okContratos===13?'ok':'warn');
  addLog('Pagamentos: ' + okPagamentos + ' ok, ' + errPagamentos + ' erros', okPagamentos===111?'ok':'warn');

  const box = document.getElementById('sucessoBox');
  box.style.display = 'block';
  document.getElementById('sucessoMsg').textContent =
    okContratos + ' contratos e ' + okPagamentos + ' pagamentos importados com sucesso. ' +
    (errContratos + errPagamentos > 0 ? (errContratos+errPagamentos) + ' erros — veja o log acima.' : 'Nenhum erro!');

  document.getElementById('btnImportar').textContent = '✅ Importação Concluída';
  setProgresso(total, total, 'Finalizado');
};
</script>
</body>
</html>
