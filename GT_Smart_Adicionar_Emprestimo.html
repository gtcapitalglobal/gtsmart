<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT Smart - Adicionar Empréstimo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 15px; }
        .container { max-width: 800px; margin: 5px auto; background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { font-size: 18px; }
        .btn-back { background: rgba(255,255,255,0.2); color: white; border: 2px solid white; padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 13px; text-decoration: none; }
        .content { padding: 15px 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; color: #333; font-weight: 500; font-size: 12px; }
        input, select { width: 100%; padding: 8px 10px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 13px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-primary { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .info-box { background: #e7f3ff; padding: 10px; border-radius: 6px; margin-bottom: 12px; font-size: 12px; color: #0066cc; }
    
        /* Dark Mode */
        body.dark-mode { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        body.dark-mode .container { background: #0f0f23; color: #e0e0e0; }
        body.dark-mode .header { }
        body.dark-mode .content { color: #e0e0e0; }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea { background: #16213e; color: #e0e0e0; border-color: #333; }
        body.dark-mode .card-item, body.dark-mode .summary-card { border-color: #333; }
    
        @media (max-width: 600px) {
            .summary-grid { grid-template-columns: repeat(2, 1fr) !important; }
            .cards-grid { grid-template-columns: 1fr !important; }
            .header { flex-direction: column; text-align: center; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>➕ Adicionar Empréstimo</h2>
            <a href="GT_Smart_Gestao.html" class="btn-back">← Voltar</a>
        </div>
        <div class="content">
            <div class="info-box" id="autoFillInfo" style="display:none;">✅ Dados carregados automaticamente!</div>
            <form id="loanForm">
                <div class="form-group">
                    <label>Nome do Cliente *</label>
                    <input type="text" id="clientName" required>
                </div>
                <div class="form-group">
                    <label>📱 WhatsApp (com código do país, ex: 13051234567)</label>
                    <input type="tel" id="clientPhone" placeholder="13051234567">
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Valor Total ($) *</label>
                        <input type="number" id="loanAmount" required step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Número de Parcelas *</label>
                        <input type="number" id="numPayments" required>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Valor da Parcela ($) *</label>
                        <input type="number" id="paymentAmount" required step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Frequência *</label>
                        <select id="frequency">
                            <option value="weekly">Semanal</option>
                            <option value="biweekly">Quinzenal</option>
                            <option value="monthly">Mensal</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Data do Empréstimo *</label>
                        <input type="date" id="loanDate" required>
                    </div>
                    <div class="form-group">
                        <label>Primeira Parcela *</label>
                        <input type="date" id="firstPaymentDate" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="btnSalvar">💾 Registrar Empréstimo</button>
            </form>
        </div>
    
    <p style="text-align:center;font-size:11px;opacity:0.5;padding:10px;">Basic 2.0 | 06/03/2026</p>
    </div>

    <script type="module">
        // Dark mode
        if (localStorage.getItem('gtSmartDarkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        import { auth, onAuthStateChanged, saveLoan } from './firebase-config.js';

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'GT_Smart_Login.html';
        });

        window.onload = function() {
            document.getElementById('loanDate').value = new Date().toISOString().split('T')[0];

            // Auto-preencher da calculadora
            const savedData = localStorage.getItem('gtSmartLoanData');
            if (savedData) {
                const data = JSON.parse(savedData);
                if (data.loanAmount) document.getElementById('loanAmount').value = data.loanAmount;
                if (data.numPayments) document.getElementById('numPayments').value = data.numPayments;
                if (data.paymentAmount) document.getElementById('paymentAmount').value = data.paymentAmount;
                if (data.firstPaymentDate) document.getElementById('firstPaymentDate').value = data.firstPaymentDate;
                document.getElementById('autoFillInfo').style.display = 'block';
                localStorage.removeItem('gtSmartLoanData');
            }

            // Auto-preencher do contrato
            const contractData = localStorage.getItem('gtSmartLoanDataFromContract');
            if (contractData) {
                const data = JSON.parse(contractData);
                if (data.clientName) document.getElementById('clientName').value = data.clientName;
                if (data.loanAmount) document.getElementById('loanAmount').value = data.loanAmount;
                if (data.numPayments) document.getElementById('numPayments').value = data.numPayments;
                if (data.paymentAmount) document.getElementById('paymentAmount').value = data.paymentAmount;
                if (data.firstPaymentDate) document.getElementById('firstPaymentDate').value = data.firstPaymentDate;
                document.getElementById('autoFillInfo').innerHTML = '✅ Dados do contrato carregados!';
                document.getElementById('autoFillInfo').style.display = 'block';
                localStorage.removeItem('gtSmartLoanDataFromContract');
            }
        };

        document.getElementById('loanForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;
            btn.textContent = '⏳ Salvando...';

            const loanAmount = parseFloat(document.getElementById('loanAmount').value);
            const numPayments = parseInt(document.getElementById('numPayments').value);
            const paymentAmount = parseFloat(document.getElementById('paymentAmount').value);
            const frequency = document.getElementById('frequency').value;
            const firstPaymentDate = document.getElementById('firstPaymentDate').value;
            const clientName = document.getElementById('clientName').value.trim();
            const clientPhone = document.getElementById('clientPhone').value.trim().replace(/\D/g, '');
            const loanDate = document.getElementById('loanDate').value;

            let periodDays = frequency === 'weekly' ? 7 : frequency === 'biweekly' ? 14 : 30;

            const payments = [];
            let currentDate = new Date(firstPaymentDate + 'T12:00:00');
            for (let i = 1; i <= numPayments; i++) {
                payments.push({
                    number: i,
                    date: currentDate.toISOString().split('T')[0],
                    amount: paymentAmount,
                    paid: false,
                    paidDate: null
                });
                currentDate.setDate(currentDate.getDate() + periodDays);
            }

            const loan = {
                id: Date.now().toString(),
                clientName,
                clientPhone,
                totalAmount: loanAmount,
                paymentAmount,
                numPayments,
                frequency,
                loanDate,
                firstPaymentDate,
                payments,
                status: 'active',
                createdAt: new Date().toISOString()
            };

            const ok = await saveLoan(loan);

            if (ok) {
                alert('✅ Empréstimo registrado com sucesso!');
                window.location.href = 'GT_Smart_Gestao.html';
            } else {
                alert('❌ Erro ao salvar. Verifique sua conexão.');
                btn.disabled = false;
                btn.textContent = '💾 Registrar Empréstimo';
            }
        });
    </script>
<a href="GT_Smart_Menu.html" style="position:fixed;bottom:20px;right:20px;background:#667eea;color:white;padding:10px 18px;border-radius:25px;text-decoration:none;font-weight:700;font-size:13px;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:999;">🏠 Menu</a>
</body>
</html>
