<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT Smart - DeFi Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0d47a1 0%, #1a237e 100%); min-height: 100vh; padding: 15px; }
        .container { max-width: 1000px; margin: 5px auto; background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #0d47a1, #1a237e); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .header h2 { font-size: 18px; }
        .header-right { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-link { background: rgba(255,255,255,0.2); color: white; border: 2px solid white; padding: 7px 13px; border-radius: 6px; font-weight: 600; font-size: 12px; text-decoration: none; }
        .content { padding: 15px 20px; }

        /* Hero */
        .hero { text-align: center; padding: 18px; border-radius: 12px; margin-bottom: 14px; }
        .hero-label { font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; opacity: 0.8; }
        .hero-value { font-size: 34px; font-weight: 900; }
        .hero-sub { font-size: 12px; margin-top: 6px; opacity: 0.8; }
        .hero-breakdown { display: flex; justify-content: center; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
        .hero-item { font-size: 12px; font-weight: 700; text-align: center; }
        .hero-item .hi-val { font-size: 15px; font-weight: 900; }
        .hero-item .hi-label { font-size: 9px; font-weight: 600; opacity: 0.7; text-transform: uppercase; margin-top: 2px; }

        /* Summary cards — 3 colunas */
        .cards-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
        .dash-card { border-radius: 10px; padding: 12px 8px; text-align: center; }
        .dash-card .dc-label { font-size: 9px; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
        .dash-card .dc-value { font-size: 17px; font-weight: 800; margin-top: 4px; }
        .dash-card .dc-sub { font-size: 10px; margin-top: 2px; opacity: 0.7; }

        /* Seção */
        .section { margin-bottom: 16px; }
        .section-title { font-size: 14px; font-weight: 800; color: #333; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
        .section-title a { font-size: 11px; font-weight: 600; color: #1565c0; text-decoration: none; }

        /* Pool row */
        .pool-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border: 1px solid #e8e8e8; border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: all 0.2s; }
        .pool-row:hover { border-color: #1565c0; background: #f0f7ff; }
        .pool-row .pr-name { font-size: 13px; font-weight: 700; color: #333; }
        .pool-row .pr-badges { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
        .pool-row .pr-val { font-size: 14px; font-weight: 800; color: #333; text-align: right; }
        .pool-row .pr-pnl { font-size: 11px; font-weight: 700; text-align: right; }

        /* Borrow row */
        .borrow-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border: 1px solid #e8e8e8; border-radius: 8px; margin-bottom: 6px; }
        .borrow-row .br-name { font-size: 13px; font-weight: 700; color: #333; }
        .borrow-row .br-sub { font-size: 11px; color: #888; margin-top: 2px; }
        .borrow-row .br-val { font-size: 14px; font-weight: 800; color: #4a2c8a; text-align: right; }
        .borrow-row .br-pct { font-size: 11px; font-weight: 700; text-align: right; }

        /* Colateral row */
        .col-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border: 1px solid #e8e8e8; border-radius: 8px; margin-bottom: 6px; }
        .col-row .cr-name { font-size: 13px; font-weight: 700; color: #333; }
        .col-row .cr-sub { font-size: 11px; color: #888; margin-top: 2px; }
        .col-row .cr-val { font-size: 14px; font-weight: 800; color: #00695c; text-align: right; }
        .col-row .cr-pnl { font-size: 11px; font-weight: 700; text-align: right; }

        /* Seção HF por rede */
        .hf-chain-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 14px; }
        .hf-chain-card { border-radius: 10px; padding: 12px 14px; border: 2px solid #e0e0e0; }
        .hf-chain-name { font-size: 13px; font-weight: 800; color: #333; margin-bottom: 6px; }
        .hf-chain-hf { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
        .hf-safe   { color: #2e7d32; }
        .hf-warn   { color: #f57f17; }
        .hf-danger { color: #c62828; }
        .hf-none   { color: #999; }
        .hf-chain-sub { font-size: 10px; color: #888; }
        .hf-bar-bg { background: #e0e0e0; border-radius: 6px; height: 6px; margin-top: 6px; overflow: hidden; }
        .hf-bar-fill { height: 100%; border-radius: 6px; }
        .hf-safe-bar   { background: linear-gradient(90deg,#43a047,#2e7d32); }
        .hf-warn-bar   { background: linear-gradient(90deg,#ffa000,#ff6f00); }
        .hf-danger-bar { background: linear-gradient(90deg,#e53935,#b71c1c); }

        /* Badges */
        .chain-badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 9px; font-weight: 700; }
        .chain-ethereum { background: #ede7f6; color: #627eea; }
        .chain-polygon  { background: #f3e5f5; color: #8247e5; }
        .chain-arbitrum { background: #e3f2fd; color: #28a0f0; }
        .chain-optimism { background: #fdecea; color: #ff0420; }
        .chain-base     { background: #e3f2fd; color: #0052ff; }
        .chain-bsc      { background: #fff8e1; color: #f0b90b; }
        .chain-default  { background: #f0f0f0; color: #666; }
        .status-badge   { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 9px; font-weight: 700; }
        .status-active  { background: #e8f5e9; color: #2e7d32; }

        /* Alerta */
        .alert-box { border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; }
        .alert-red   { background: #fdecea; border-left: 4px solid #c62828; color: #b71c1c; font-size: 13px; }
        .alert-warn  { background: #fff8e1; border-left: 4px solid #ffa000; color: #e65100; font-size: 13px; }
        .alert-green { background: #e8f5e9; border-left: 4px solid #2e7d32; color: #1b5e20; font-size: 13px; }

        @media (max-width: 600px) {
            .cards-row { grid-template-columns: repeat(2, 1fr) !important; }
            .header { flex-direction: column; text-align: center; }
            .hero-breakdown { gap: 10px; }
            .hf-chain-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📊 DeFi Dashboard</h2>
            <div class="header-right">
                <a href="GT_Smart_DeFi_Colateral.html" class="btn-link">🛡️ Colateral</a>
                <a href="GT_Smart_DeFi_Borrows.html" class="btn-link">🏦 Borrows</a>
                <a href="GT_Smart_DeFi_Pools.html" class="btn-link">🌊 Pools</a>
                <a href="GT_Smart_DeFi_Fees.html" class="btn-link">💵 Fees</a>
                <a href="GT_Smart_Menu.html" class="btn-link">← Menu</a>
            </div>
        </div>
        <div class="content">
            <div id="alertArea"></div>
            <div id="heroArea"><div class="hero" style="background:#f0f0f0;"><div class="hero-label">Carregando...</div></div></div>
            <div class="cards-row" id="summaryCards"></div>

            <!-- HF por rede -->
            <div class="section" id="hfSection" style="display:none;">
                <div class="section-title">❤️ Health Factor por Rede <a href="GT_Smart_DeFi_Colateral.html">Ver detalhes →</a></div>
                <div class="hf-chain-grid" id="hfGrid"></div>
            </div>

            <!-- Pools -->
            <div class="section" id="poolsSection">
                <div class="section-title">🌊 Pools Ativas <a href="GT_Smart_DeFi_Pools.html">Ver todas →</a></div>
                <div id="poolsList">Carregando...</div>
            </div>

            <!-- Colaterais -->
            <div class="section" id="colSection" style="display:none;">
                <div class="section-title">🛡️ Colaterais <a href="GT_Smart_DeFi_Colateral.html">Gerenciar →</a></div>
                <div id="colList"></div>
            </div>

            <!-- Borrows -->
            <div class="section" id="borrowsSection">
                <div class="section-title">🏦 Borrows <a href="GT_Smart_DeFi_Borrows.html">Ver todos →</a></div>
                <div id="borrowsList">Carregando...</div>
            </div>
        </div>
        <p style="text-align:center;font-size:11px;opacity:0.4;padding:10px;">Basic 2.0 | 08/03/2026</p>
    </div>

    <a href="GT_Smart_Menu.html" style="position:fixed;bottom:20px;right:20px;background:#1a237e;color:white;padding:10px 18px;border-radius:25px;text-decoration:none;font-weight:700;font-size:13px;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:999;">🏠 Menu</a>

    <script type="module">
        import { auth, onAuthStateChanged, db } from './firebase-config.js';
        import { collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        let allCryptos=[], pools=[], borrows=[], colaterais=[], userId=null;

        const fmt = v => {
            if(v>=1e9) return '$'+(v/1e9).toFixed(2)+'B';
            if(v>=1e6) return '$'+(v/1e6).toFixed(2)+'M';
            return '$'+parseFloat(v||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
        };
        const fmt2 = v => '$'+parseFloat(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

        async function loadAll() {
            try { const s=await getDocs(collection(db,'users',userId,'defi_pools')); pools=s.docs.map(d=>({...d.data(),id:d.id})); } catch(e){pools=[];}
            try { const s=await getDocs(collection(db,'users',userId,'defi_borrows')); borrows=s.docs.map(d=>({...d.data(),id:d.id})); } catch(e){borrows=[];}
            try { const s=await getDocs(collection(db,'users',userId,'defi_colateral')); colaterais=s.docs.map(d=>({...d.data(),id:d.id})); } catch(e){colaterais=[];}
        }

        async function loadPrices() {
            try {
                const r=await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false');
                if(r.ok) allCryptos=await r.json();
            } catch(e){}
            // rETH
            const eth=allCryptos.find(x=>x.id==='ethereum');
            if(eth){
                const RETH_RATIO=1.1615;
                const rethObj={id:'rocket-pool-eth',symbol:'reth',name:'rETH',image:'https://assets.coingecko.com/coins/images/20764/small/reth.png',current_price:eth.current_price*RETH_RATIO};
                const idx=allCryptos.findIndex(x=>x.id==='rocket-pool-eth');
                if(idx>=0) allCryptos[idx]=rethObj; else allCryptos.push(rethObj);
            }
        }

        function getPrice(id){ const c=allCryptos.find(x=>x.id===id); return c?c.current_price:0; }

        function getTotalDebt(chain){
            return borrows.filter(b=>(b.chain||'Ethereum')===chain).reduce((s,b)=>s+parseFloat(b.amount||0)*getPrice(b.cryptoId),0);
        }

        function calcHF(colsChain, chain){
            const debt=getTotalDebt(chain);
            if(debt<=0) return null;
            const num=colsChain.reduce((s,c)=>s+parseFloat(c.amount||0)*getPrice(c.cryptoId)*(parseFloat(c.liqThreshold||80)/100),0);
            return num/debt;
        }

        function hfClass(hf){ if(hf===null)return'hf-none'; if(hf<1.2)return'hf-danger'; if(hf<1.5)return'hf-warn'; return'hf-safe'; }
        function hfBarClass(hf){ if(hf===null)return'hf-safe-bar'; if(hf<1.2)return'hf-danger-bar'; if(hf<1.5)return'hf-warn-bar'; return'hf-safe-bar'; }
        function hfBarPct(hf){ return hf===null?100:Math.min(100,(hf/3)*100); }

        function render() {
            const activePools=pools.filter(p=>p.status!=='closed');
            const allChains=[...new Set([...colaterais.map(c=>c.chain||'Ethereum'),...borrows.map(b=>b.chain||'Ethereum')])];
            const alerts=[], hfWarns=[];

            // ===== TOTAIS =====
            let totalPoolVal=0, totalInvest=0, totalFees=0;
            activePools.forEach(p=>{
                const pA=getPrice(p.tokenAId), pB=getPrice(p.tokenBId);
                const val=(p.currentAmountA||p.amountA||0)*pA+(p.currentAmountB||p.amountB||0)*pB;
                totalPoolVal+=val;
                totalInvest+=(p.investmentA||(p.amountA||0)*(p.entryPriceA||0))+(p.investmentB||(p.amountB||0)*(p.entryPriceB||0));
                totalFees+=parseFloat(p.feesEarned||0);
                // range alert
                if((p.rangeMin||p.rangeMax)&&pB>0){
                    const ratio=pA/pB;
                    if(ratio<(p.rangeMin||0)||ratio>(p.rangeMax||Infinity))
                        alerts.push((p.poolName||(p.tokenASymbol||'?').toUpperCase()+'/'+(p.tokenBSymbol||'?').toUpperCase()));
                }
            });

            const totalColUsd=colaterais.reduce((s,c)=>s+parseFloat(c.amount||0)*getPrice(c.cryptoId),0);
            const totalBorrows=borrows.reduce((s,b)=>s+parseFloat(b.amount||0)*getPrice(b.cryptoId),0);

            // HF por rede — alertas
            allChains.forEach(ch=>{
                const colsChain=colaterais.filter(c=>(c.chain||'Ethereum')===ch);
                if(colsChain.length===0) return;
                const hf=calcHF(colsChain,ch);
                if(hf!==null&&hf<1.2) alerts.push('⚠️ HF CRÍTICO '+ch+': '+hf.toFixed(2));
                else if(hf!==null&&hf<1.5) hfWarns.push('HF baixo '+ch+': '+hf.toFixed(2));
            });

            // Posição líquida real = Colateral + Pools − Borrows
            const posicaoLiquida = totalColUsd + totalPoolVal - totalBorrows;
            const pnlPools = totalPoolVal - totalInvest + totalFees;
            const pnlCol = colaterais.reduce((s,c)=>{
                const cur=parseFloat(c.amount||0)*getPrice(c.cryptoId);
                const entry=parseFloat(c.amount||0)*parseFloat(c.entryPrice||getPrice(c.cryptoId));
                return s+(cur-entry);
            },0);

            // ===== ALERTAS =====
            let alertHtml='';
            if(alerts.length>0) alertHtml+='<div class="alert-box alert-red"><strong>🚨 '+alerts.length+' alerta(s):</strong> '+alerts.join(' | ')+'</div>';
            if(hfWarns.length>0) alertHtml+='<div class="alert-box alert-warn"><strong>⚠️ Atenção:</strong> '+hfWarns.join(' | ')+'</div>';
            document.getElementById('alertArea').innerHTML=alertHtml;

            // ===== HERO =====
            const heroColor = posicaoLiquida>=0?'#e8f5e9':'#fdecea';
            const heroTxtColor = posicaoLiquida>=0?'#2e7d32':'#c62828';
            const sign = posicaoLiquida>=0?'+':'';
            document.getElementById('heroArea').innerHTML=
                '<div class="hero" style="background:'+heroColor+';">'+
                    '<div class="hero-label" style="color:'+heroTxtColor+';">💼 Posição Líquida DeFi (Colateral + Pools − Dívidas)</div>'+
                    '<div class="hero-value" style="color:'+heroTxtColor+';">'+sign+fmt(posicaoLiquida)+'</div>'+
                    '<div class="hero-breakdown">'+
                        '<div class="hero-item" style="color:#00695c;"><div class="hi-val">'+fmt(totalColUsd)+'</div><div class="hi-label">🛡️ Colateral</div></div>'+
                        '<div class="hero-item" style="color:#555;font-size:20px;padding-top:4px;">+</div>'+
                        '<div class="hero-item" style="color:#1565c0;"><div class="hi-val">'+fmt(totalPoolVal)+'</div><div class="hi-label">🌊 Pools</div></div>'+
                        '<div class="hero-item" style="color:#555;font-size:20px;padding-top:4px;">−</div>'+
                        '<div class="hero-item" style="color:#4a2c8a;"><div class="hi-val">'+fmt(totalBorrows)+'</div><div class="hi-label">🏦 Borrows</div></div>'+
                    '</div>'+
                '</div>';

            // ===== CARDS =====
            const pnlPoolSign=pnlPools>=0?'+':'';
            const pnlColSign=pnlCol>=0?'+':'';
            document.getElementById('summaryCards').innerHTML=
                '<div class="dash-card" style="background:#e0f2f1;color:#00695c;"><div class="dc-label">🛡️ Colateral</div><div class="dc-value">'+fmt(totalColUsd)+'</div><div class="dc-sub" style="color:'+(pnlCol>=0?'#2e7d32':'#c62828')+';">PnL: '+pnlColSign+fmt(pnlCol)+'</div></div>'+
                '<div class="dash-card" style="background:#e3f2fd;color:#1565c0;"><div class="dc-label">🌊 TVL Pools</div><div class="dc-value">'+fmt(totalPoolVal)+'</div><div class="dc-sub">'+activePools.length+' pools ativas</div></div>'+
                '<div class="dash-card" style="background:#ede7f6;color:#4a2c8a;"><div class="dc-label">🏦 Borrows</div><div class="dc-value">'+fmt(totalBorrows)+'</div><div class="dc-sub">'+borrows.length+' posições</div></div>'+
                '<div class="dash-card" style="background:#e8f5e9;color:#2e7d32;"><div class="dc-label">💵 Fees Ganhos</div><div class="dc-value">'+fmt(totalFees)+'</div><div class="dc-sub">acumulado</div></div>'+
                '<div class="dash-card" style="background:#fff8e1;color:#f57f17;"><div class="dc-label">📈 PnL Pools</div><div class="dc-value" style="color:'+(pnlPools>=0?'#2e7d32':'#c62828')+';">'+pnlPoolSign+fmt(pnlPools)+'</div><div class="dc-sub">vs investimento</div></div>'+
                '<div class="dash-card" style="background:'+(posicaoLiquida>=0?'#e8f5e9':'#fdecea')+';color:'+(posicaoLiquida>=0?'#2e7d32':'#c62828')+';"><div class="dc-label">💼 Posição Líquida</div><div class="dc-value">'+sign+fmt(posicaoLiquida)+'</div><div class="dc-sub">Col+Pools−Borrows</div></div>';

            // ===== HF POR REDE =====
            const chainsComCol=allChains.filter(ch=>colaterais.some(c=>(c.chain||'Ethereum')===ch));
            if(chainsComCol.length>0){
                document.getElementById('hfSection').style.display='block';
                const chainEmoji={Ethereum:'⟠',Arbitrum:'🔵',Polygon:'🟣',Optimism:'🔴',Base:'🔷',BSC:'🟡'};
                document.getElementById('hfGrid').innerHTML=chainsComCol.map(ch=>{
                    const colsChain=colaterais.filter(c=>(c.chain||'Ethereum')===ch);
                    const hf=calcHF(colsChain,ch);
                    const debt=getTotalDebt(ch);
                    const colCh=colsChain.reduce((s,c)=>s+parseFloat(c.amount||0)*getPrice(c.cryptoId),0);
                    const ltv=colCh>0?(debt/colCh*100):0;
                    const hfTxt=hf===null?'∞':hf.toFixed(2);
                    const status=hf===null?'Sem dívidas':hf<1.2?'🚨 CRÍTICO':hf<1.5?'⚠️ Atenção':'✅ Seguro';
                    return '<div class="hf-chain-card" style="border-color:'+(hf===null?'#e0e0e0':hf<1.2?'#e53935':hf<1.5?'#ffa000':'#43a047')+';">'+
                        '<div class="hf-chain-name">'+(chainEmoji[ch]||'⛓️')+' '+ch+'</div>'+
                        '<div class="hf-chain-hf '+hfClass(hf)+'">'+hfTxt+'</div>'+
                        '<div class="hf-chain-sub">'+status+'</div>'+
                        '<div class="hf-chain-sub" style="margin-top:3px;">Col: '+fmt(colCh)+' | Dív: '+fmt(debt)+' | LTV: '+ltv.toFixed(1)+'%</div>'+
                        '<div class="hf-bar-bg"><div class="hf-bar-fill '+hfBarClass(hf)+'" style="width:'+hfBarPct(hf)+'%;"></div></div>'+
                    '</div>';
                }).join('');
            }

            // ===== POOLS =====
            if(activePools.length===0){
                document.getElementById('poolsList').innerHTML='<div style="text-align:center;color:#999;padding:15px;">Nenhuma pool ativa</div>';
            } else {
                document.getElementById('poolsList').innerHTML=activePools.map(p=>{
                    const pA=getPrice(p.tokenAId), pB=getPrice(p.tokenBId);
                    const val=(p.currentAmountA||p.amountA||0)*pA+(p.currentAmountB||p.amountB||0)*pB;
                    const inv=(p.investmentA||(p.amountA||0)*(p.entryPriceA||0))+(p.investmentB||(p.amountB||0)*(p.entryPriceB||0));
                    const poolPnl=val-inv+parseFloat(p.feesEarned||0);
                    const name=p.poolName||((p.tokenASymbol||'?').toUpperCase()+'/'+(p.tokenBSymbol||'?').toUpperCase());
                    const chainCls='chain-'+(p.chain||'default').toLowerCase();
                    return '<div class="pool-row" onclick="window.location.href=\'GT_Smart_DeFi_Pools.html\'">'+
                        '<div><div class="pr-name">'+name+'</div><div class="pr-badges"><span class="chain-badge '+chainCls+'">'+(p.chain||'')+'</span> <span class="status-badge status-active">✅ Ativa</span></div></div>'+
                        '<div><div class="pr-val">'+fmt(val)+'</div><div class="pr-pnl" style="color:'+(poolPnl>=0?'#2e7d32':'#c62828')+';">'+(poolPnl>=0?'+':'')+fmt(poolPnl)+'</div></div>'+
                    '</div>';
                }).join('');
            }

            // ===== COLATERAIS =====
            if(colaterais.length>0){
                document.getElementById('colSection').style.display='block';
                document.getElementById('colList').innerHTML=colaterais.map(c=>{
                    const price=getPrice(c.cryptoId);
                    const cur=parseFloat(c.amount||0)*price;
                    const entry=parseFloat(c.amount||0)*parseFloat(c.entryPrice||price);
                    const pnl=cur-entry;
                    const pnlSign=pnl>=0?'+':'';
                    const chainCls='chain-'+(c.chain||'default').toLowerCase();
                    return '<div class="col-row">'+
                        '<div><div class="cr-name">'+(c.cryptoSymbol||'?').toUpperCase()+' <span class="chain-badge '+chainCls+'">'+(c.chain||'')+'</span></div>'+
                        '<div class="cr-sub">'+parseFloat(c.amount||0).toLocaleString('en-US',{maximumFractionDigits:4})+' · '+fmt2(price)+' · '+(c.protocol||'Aave')+'</div></div>'+
                        '<div><div class="cr-val">'+fmt(cur)+'</div>'+
                        (c.entryPrice?'<div class="cr-pnl" style="color:'+(pnl>=0?'#2e7d32':'#c62828')+';">'+pnlSign+fmt(pnl)+'</div>':'')+'</div>'+
                    '</div>';
                }).join('');
            }

            // ===== BORROWS =====
            if(borrows.length===0){
                document.getElementById('borrowsList').innerHTML='<div style="text-align:center;color:#999;padding:15px;">Nenhum borrow</div>';
            } else {
                document.getElementById('borrowsList').innerHTML=borrows.map(b=>{
                    const price=getPrice(b.cryptoId);
                    const val=parseFloat(b.amount||0)*price;
                    let totalPct=0;
                    pools.forEach(p=>{
                        if(p.borrowIdA===b.id) totalPct+=parseFloat(p.borrowPctA||0);
                        if(p.borrowIdB===b.id) totalPct+=parseFloat(p.borrowPctB||0);
                    });
                    const chainCls='chain-'+(b.chain||'default').toLowerCase();
                    return '<div class="borrow-row">'+
                        '<div><div class="br-name">'+(b.cryptoSymbol||'?').toUpperCase()+' <span class="chain-badge '+chainCls+'">'+(b.chain||'')+'</span></div>'+
                        '<div class="br-sub">'+parseFloat(b.amount||0).toLocaleString('en-US',{maximumFractionDigits:4})+(b.rate?' · '+b.rate+'% APY':'')+' · '+(b.protocol||'Aave')+'</div></div>'+
                        '<div><div class="br-val">'+fmt(val)+'</div>'+
                        '<div class="br-pct" style="color:'+(totalPct>=100?'#c62828':totalPct>0?'#f57f17':'#2e7d32')+';">'+totalPct.toFixed(0)+'% em pools</div></div>'+
                    '</div>';
                }).join('');
            }
        }

        onAuthStateChanged(auth, async(user)=>{
            if(!user){window.location.href='GT_Smart_Login.html';return;}
            userId=user.uid;
            await Promise.all([loadPrices(), loadAll()]);
            render();
            setInterval(async()=>{await Promise.all([loadPrices(),loadAll()]);render();},60000);
        });
    </script>
</body>
</html>
