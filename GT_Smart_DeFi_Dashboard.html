<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT Smart - DeFi Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0d47a1 0%, #1a237e 100%); min-height: 100vh; padding: 15px; }
        .container { max-width: 1000px; margin: 5px auto; background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #0d47a1, #1a237e); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .header h2 { font-size: 18px; }
        .header-right { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-link { background: rgba(255,255,255,0.2); color: white; border: 2px solid white; padding: 7px 13px; border-radius: 6px; font-weight: 600; font-size: 12px; text-decoration: none; }
        .content { padding: 15px 20px; }

        .hero { text-align: center; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .hero-label { font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
        .hero-value { font-size: 32px; font-weight: 900; }
        .hero-sub { font-size: 13px; margin-top: 6px; opacity: 0.8; }

        .cards-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .dash-card { border-radius: 10px; padding: 14px; text-align: center; }
        .dash-card .dc-label { font-size: 10px; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
        .dash-card .dc-value { font-size: 18px; font-weight: 800; margin-top: 4px; }
        .dash-card .dc-sub { font-size: 10px; margin-top: 2px; opacity: 0.7; }

        .section { margin-bottom: 15px; }
        .section-title { font-size: 14px; font-weight: 800; color: #333; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid #e0e0e0; }

        .pool-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border: 1px solid #e8e8e8; border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: all 0.2s; }
        .pool-row:hover { border-color: #1565c0; background: #f0f7ff; }
        .pool-row .pr-name { font-size: 13px; font-weight: 700; color: #333; }
        .pool-row .pr-badges { display: flex; gap: 4px; margin-top: 2px; }
        .pool-row .pr-value { text-align: right; }
        .pool-row .pr-val { font-size: 14px; font-weight: 800; color: #333; }
        .pool-row .pr-pnl { font-size: 11px; font-weight: 700; }

        .borrow-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border: 1px solid #e8e8e8; border-radius: 8px; margin-bottom: 6px; }
        .borrow-row .br-name { font-size: 13px; font-weight: 700; color: #333; }
        .borrow-row .br-sub { font-size: 11px; color: #888; }
        .borrow-row .br-value { text-align: right; }
        .borrow-row .br-val { font-size: 14px; font-weight: 800; color: #333; }
        .borrow-row .br-pct { font-size: 11px; font-weight: 700; }

        .chain-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 9px; font-weight: 700; }
        .chain-ethereum { background: #ede7f6; color: #627eea; }
        .chain-polygon { background: #f3e5f5; color: #8247e5; }
        .chain-arbitrum { background: #e3f2fd; color: #28a0f0; }
        .chain-optimism { background: #fdecea; color: #ff0420; }
        .chain-avalanche { background: #fdecea; color: #e84142; }
        .chain-base { background: #e3f2fd; color: #0052ff; }
        .chain-bsc { background: #fff8e1; color: #f0b90b; }
        .chain-default { background: #f0f0f0; color: #666; }

        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 9px; font-weight: 700; }
        .status-active { background: #e8f5e9; color: #2e7d32; }

        .alert-box { border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .alert-red { background: #fdecea; border-left: 4px solid #c62828; }
        .alert-green { background: #e8f5e9; border-left: 4px solid #2e7d32; }

        body.dark-mode { background: linear-gradient(135deg, #0a0a1e 0%, #16213e 100%); }
        body.dark-mode .container { background: #0f0f23; color: #e0e0e0; }
        body.dark-mode .pool-row { border-color: #333; }
        body.dark-mode .pool-row:hover { background: #16213e; border-color: #1565c0; }
        body.dark-mode .pool-row .pr-name { color: #e0e0e0; }
        body.dark-mode .pool-row .pr-val { color: #e0e0e0; }
        body.dark-mode .borrow-row { border-color: #333; }
        body.dark-mode .borrow-row .br-name { color: #e0e0e0; }
        body.dark-mode .borrow-row .br-val { color: #e0e0e0; }
        body.dark-mode .section-title { color: #e0e0e0; border-color: #333; }
        body.dark-mode .dash-card .dc-value { color: inherit; }

        @media (max-width: 600px) {
            .cards-row { grid-template-columns: repeat(2, 1fr); }
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📊 DeFi Dashboard <span style="font-size:10px;opacity:0.7;">v1.0</span></h2>
            <div class="header-right">
                <a href="GT_Smart_DeFi_Fees.html" class="btn-link">💵 Fees</a>
                <a href="GT_Smart_DeFi_Borrows.html" class="btn-link">🏦 Borrows</a>
                <a href="GT_Smart_DeFi_Pools.html" class="btn-link">🌊 Pools</a>
                <a href="GT_Smart_Cripto.html" class="btn-link">🪙 Cripto</a>
                <a href="GT_Smart_Menu.html" class="btn-link">← Menu</a>
            </div>
        </div>
        <div class="content">
            <div id="alertArea"></div>
            <div id="heroArea">
                <div class="hero" style="background:#f0f0f0;"><div class="hero-label">Carregando...</div></div>
            </div>
            <div class="cards-row" id="summaryCards"></div>
            <div class="section" id="poolsSection">
                <div class="section-title">🌊 Pools Ativas</div>
                <div id="poolsList">Carregando...</div>
            </div>
            <div class="section" id="borrowsSection">
                <div class="section-title">🏦 Borrows</div>
                <div id="borrowsList">Carregando...</div>
            </div>
        </div>
        <p style="text-align:center;font-size:11px;opacity:0.5;padding:10px;">Basic 1.0 | 07/03/2026</p>
    </div>

    <a href="GT_Smart_Menu.html" style="position:fixed;bottom:20px;right:20px;background:#1a237e;color:white;padding:10px 18px;border-radius:25px;text-decoration:none;font-weight:700;font-size:13px;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:999;">🏠 Menu</a>

    <script type="module">
        import { auth, onAuthStateChanged, db } from './firebase-config.js';
        import { collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        if (localStorage.getItem('gtSmartDarkMode') === 'true') document.body.classList.add('dark-mode');

        let allCryptos = [], pools = [], borrows = [], userId = null;

        const fmtUsd = (v) => {
            if (v >= 1e9) return '$' + (v/1e9).toFixed(2) + 'B';
            if (v >= 1e6) return '$' + (v/1e6).toFixed(2) + 'M';
            return '$' + parseFloat(v||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
        };

        function getPrice(id) { const c = allCryptos.find(x => x.id === id); return c ? c.current_price : 0; }

        async function loadAll() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false');
                if (res.ok) allCryptos = await res.json();
            } catch(e) {}
            try {
                const snap1 = await getDocs(collection(db, 'users', userId, 'defi_pools'));
                pools = snap1.docs.map(d => ({ ...d.data(), id: d.id }));
            } catch(e) { pools = []; }
            try {
                const snap2 = await getDocs(collection(db, 'users', userId, 'defi_borrows'));
                borrows = snap2.docs.map(d => ({ ...d.data(), id: d.id }));
            } catch(e) { borrows = []; }
        }

        function render() {
            // Calculate totals
            let totalPoolVal = 0, totalInvest = 0, totalDebt = 0, totalFees = 0;
            const activePools = pools.filter(p => p.status !== 'closed');
            const alerts = [];

            activePools.forEach(p => {
                const pA = getPrice(p.tokenAId), pB = getPrice(p.tokenBId);
                const curA = p.currentAmountA || p.amountA || 0;
                const curB = p.currentAmountB || p.amountB || 0;
                const val = curA * pA + curB * pB;
                totalPoolVal += val;
                totalInvest += (p.investmentA || (p.amountA||0) * (p.entryPriceA||0)) + (p.investmentB || (p.amountB||0) * (p.entryPriceB||0));
                totalFees += parseFloat(p.feesEarned || 0);

                // Borrow debt per pool
                if (p.borrowIdA) {
                    const bA = borrows.find(b => b.id === p.borrowIdA);
                    if (bA) totalDebt += parseFloat(bA.amount||0) * (parseFloat(p.borrowPctA||0)/100) * getPrice(bA.cryptoId);
                }
                if (p.borrowIdB) {
                    const bB = borrows.find(b => b.id === p.borrowIdB);
                    if (bB) totalDebt += parseFloat(bB.amount||0) * (parseFloat(p.borrowPctB||0)/100) * getPrice(bB.cryptoId);
                }

                // Range alerts
                if ((p.rangeMin || p.rangeMax) && pB > 0) {
                    const ratio = pA / pB;
                    if (ratio < (p.rangeMin||0) || ratio > (p.rangeMax||Infinity)) {
                        const name = p.poolName || ((p.tokenASymbol||'?').toUpperCase() + '/' + (p.tokenBSymbol||'?').toUpperCase());
                        alerts.push(name);
                    }
                }
            });

            let totalBorrowed = 0;
            borrows.forEach(b => { totalBorrowed += (b.amount||0) * getPrice(b.cryptoId); });

            const realPnl = totalPoolVal - totalDebt;
            const pnlInvest = totalPoolVal - totalInvest + totalFees;
            const pnlPct = totalInvest > 0 ? (pnlInvest / totalInvest * 100) : 0;

            // Alerts
            let alertHtml = '';
            if (alerts.length > 0) {
                alertHtml = '<div class="alert-box alert-red"><strong>⚠️ ' + alerts.length + ' pool(s) fora do range:</strong> ' + alerts.join(', ') + '</div>';
            }
            document.getElementById('alertArea').innerHTML = alertHtml;

            // Hero
            const hasDebt = totalDebt > 0;
            document.getElementById('heroArea').innerHTML =
                '<div class="hero" style="background:' + (realPnl >= 0 ? '#e8f5e9' : '#fdecea') + ';">' +
                    '<div class="hero-label" style="color:' + (realPnl >= 0 ? '#2e7d32' : '#c62828') + ';">' + (hasDebt ? '🎯 Lucro Real Total (Pools - Dívidas)' : '📊 PnL Total') + '</div>' +
                    '<div class="hero-value" style="color:' + (realPnl >= 0 ? '#2e7d32' : '#c62828') + ';">' + (realPnl >= 0 ? '+' : '') + fmtUsd(hasDebt ? realPnl : pnlInvest) + '</div>' +
                    (hasDebt ? '<div class="hero-sub" style="color:' + (realPnl >= 0 ? '#2e7d32' : '#c62828') + ';">Pools: ' + fmtUsd(totalPoolVal) + ' | Dívidas: ' + fmtUsd(totalDebt) + '</div>' : '') +
                '</div>';

            // Summary cards
            document.getElementById('summaryCards').innerHTML =
                '<div class="dash-card" style="background:#e3f2fd;color:#1565c0;"><div class="dc-label">💰 TVL (Pools)</div><div class="dc-value">' + fmtUsd(totalPoolVal) + '</div><div class="dc-sub">' + activePools.length + ' pools ativas</div></div>' +
                '<div class="dash-card" style="background:#ede7f6;color:#4a2c8a;"><div class="dc-label">🏦 Total Emprestado</div><div class="dc-value">' + fmtUsd(totalBorrowed) + '</div><div class="dc-sub">' + borrows.length + ' borrows</div></div>' +
                '<div class="dash-card" style="background:#e8f5e9;color:#2e7d32;"><div class="dc-label">💵 Fees Ganhos</div><div class="dc-value">' + fmtUsd(totalFees) + '</div></div>' +
                '<div class="dash-card" style="background:#fff3e0;color:#e65100;"><div class="dc-label">📈 PnL (Invest.)</div><div class="dc-value" style="color:' + (pnlInvest >= 0 ? '#2e7d32' : '#c62828') + ';">' + (pnlInvest >= 0 ? '+' : '') + fmtUsd(pnlInvest) + '</div><div class="dc-sub">' + (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(1) + '%</div></div>';

            // Pools list
            if (activePools.length === 0) {
                document.getElementById('poolsList').innerHTML = '<div style="text-align:center;color:#999;padding:15px;">Nenhuma pool ativa</div>';
            } else {
                document.getElementById('poolsList').innerHTML = activePools.map(p => {
                    const pA = getPrice(p.tokenAId), pB = getPrice(p.tokenBId);
                    const curA = p.currentAmountA || p.amountA || 0;
                    const curB = p.currentAmountB || p.amountB || 0;
                    const val = curA * pA + curB * pB;
                    const inv = (p.investmentA || (p.amountA||0)*(p.entryPriceA||0)) + (p.investmentB || (p.amountB||0)*(p.entryPriceB||0));
                    const poolPnl = val - inv + parseFloat(p.feesEarned||0);
                    const name = p.poolName || ((p.tokenASymbol||'?').toUpperCase() + '/' + (p.tokenBSymbol||'?').toUpperCase());
                    const chainCls = 'chain-' + (p.chain||'default').toLowerCase();
                    return '<div class="pool-row" onclick="window.location.href=\'GT_Smart_DeFi_Pools.html\'">' +
                        '<div><div class="pr-name">' + name + '</div><div class="pr-badges"><span class="chain-badge ' + chainCls + '">' + (p.chain||'') + '</span> <span class="status-badge status-active">✅ Ativa</span></div></div>' +
                        '<div class="pr-value"><div class="pr-val">' + fmtUsd(val) + '</div><div class="pr-pnl" style="color:' + (poolPnl >= 0 ? '#2e7d32' : '#c62828') + ';">' + (poolPnl >= 0 ? '+' : '') + fmtUsd(poolPnl) + '</div></div>' +
                    '</div>';
                }).join('');
            }

            // Borrows list
            if (borrows.length === 0) {
                document.getElementById('borrowsList').innerHTML = '<div style="text-align:center;color:#999;padding:15px;">Nenhum borrow</div>';
            } else {
                document.getElementById('borrowsList').innerHTML = borrows.map(b => {
                    const price = getPrice(b.cryptoId);
                    const val = (b.amount||0) * price;
                    const sym = (b.cryptoSymbol||'?').toUpperCase();
                    // Calc allocation
                    let totalPct = 0;
                    pools.forEach(p => {
                        if (p.borrowIdA === b.id) totalPct += parseFloat(p.borrowPctA||0);
                        if (p.borrowIdB === b.id) totalPct += parseFloat(p.borrowPctB||0);
                    });
                    const pctColor = totalPct >= 100 ? '#c62828' : totalPct > 0 ? '#f57f17' : '#2e7d32';
                    return '<div class="borrow-row">' +
                        '<div><div class="br-name">' + sym + ' — ' + parseFloat(b.amount||0).toLocaleString('en-US',{maximumFractionDigits:4}) + '</div><div class="br-sub">' + (b.protocol||'') + ' | ' + (b.chain||'') + (b.rate ? ' | APY ' + b.rate + '%' : '') + '</div></div>' +
                        '<div class="br-value"><div class="br-val">' + fmtUsd(val) + '</div><div class="br-pct" style="color:' + pctColor + ';">' + totalPct.toFixed(1) + '% alocado</div></div>' +
                    '</div>';
                }).join('');
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'GT_Smart_Login.html'; return; }
            userId = user.uid;
            await loadAll();
            render();
            setInterval(async () => { await loadAll(); render(); }, 60000);
        });
    </script>
</body>
</html>
