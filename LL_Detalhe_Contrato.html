<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledgerlands — Contract Details</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%); min-height: 100vh; padding: 15px; }
        .container { max-width: 1000px; margin: 5px auto; background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #1565c0, #0d47a1); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .header h2 { font-size: 18px; font-weight: 800; }
        .header-right { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .btn-back { background: rgba(255,255,255,0.2); color: white; border: 2px solid white; padding: 7px 13px; border-radius: 6px; font-weight: 600; font-size: 13px; text-decoration: none; }
        .btn-act { background: white; color: #1565c0; border: none; padding: 8px 14px; border-radius: 6px; font-weight: 700; font-size: 13px; cursor: pointer; }
        .content { padding: 20px; }

        /* Grid 2 colunas */
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

        /* Card de info */
        .info-card { border: 2px solid #e0e0e0; border-radius: 12px; padding: 16px; }
        .info-card .card-title { font-size: 12px; font-weight: 800; color: #1565c0; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; border-bottom: 1px solid #e3f2fd; padding-bottom: 6px; }
        .info-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
        .info-row:last-child { border-bottom: none; }
        .info-lbl { color: #888; font-weight: 600; }
        .info-val { font-weight: 700; text-align: right; }
        .info-val.green { color: #2e7d32; }
        .info-val.red { color: #c62828; }
        .info-val.blue { color: #1565c0; }

        /* Status badge */
        .status { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
        .s-Active { background: #e8f5e9; color: #2e7d32; }
        .s-PaidOff { background: #e3f2fd; color: #1565c0; }
        .s-Default { background: #fdecea; color: #c62828; }
        .s-Repossessed { background: #f5f5f5; color: #757575; }

        /* Progress bar */
        .progress-wrap { margin: 6px 0 2px; }
        .progress-bar { background: #f0f0f0; border-radius: 10px; height: 8px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #1565c0, #42a5f5); transition: width 0.5s; }
        .progress-pct { font-size: 11px; color: #888; margin-top: 3px; text-align: right; }

        /* Parcelas section */
        .section-title { font-size: 15px; font-weight: 800; color: #333; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f5f5f5; padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; }
        td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        tr.pago td { color: #aaa; }
        tr.vencida td:first-child { border-left: 3px solid #c62828; }
        tr.vencendo td:first-child { border-left: 3px solid #f57f17; }

        .inst-status { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
        .is-PAID { background: #e8f5e9; color: #2e7d32; }
        .is-PENDING { background: #fff8e1; color: #f57f17; }
        .is-OVERDUE { background: #fdecea; color: #c62828; }
        .is-BALLOON { background: #e3f2fd; color: #1565c0; }
        .is-regular { background: #f3f4f6; color: #555; }

        .btn-sm { padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 700; border: none; cursor: pointer; }
        .btn-pagar { background: #e8f5e9; color: #2e7d32; }
        .btn-despagar { background: #fdecea; color: #c62828; }

        /* Pagamentos */
        .pagamento-item { background: #f9f9f9; border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .pagamento-item .pag-left { flex: 1; }
        .pagamento-item .pag-valor { font-size: 16px; font-weight: 800; color: #2e7d32; }
        .pagamento-item .pag-info { font-size: 11px; color: #888; margin-top: 2px; }
        .canal-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; background: #e3f2fd; color: #1565c0; font-size: 10px; font-weight: 700; margin-left: 4px; }

        .btn-pag-novo { background: #1565c0; color: white; border: none; padding: 8px 16px; border-radius: 7px; font-weight: 700; font-size: 13px; cursor: pointer; }

        /* Modal pagamento */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 14px; padding: 24px; width: 100%; max-width: 480px; position: relative; }
        .modal h3 { font-size: 17px; font-weight: 800; margin-bottom: 16px; color: #1565c0; }
        .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; }
        .form-group input:focus, .form-group select:focus { border-color: #1565c0; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-save { background: #1565c0; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; width: 100%; margin-top: 8px; }

        .empty { text-align: center; padding: 30px; color: #aaa; font-size: 13px; }

        /* Seção de Envio */
        .wa-section { border: 2px solid #dcfce7; border-radius: 12px; padding: 16px; margin-top: 20px; background: #f0fdf4; }
        .wa-title { font-size: 14px; font-weight: 800; color: #166534; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

        .wa-phone-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .wa-phone-row label { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; white-space: nowrap; }
        .wa-phone-row input { flex: 1; padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 13px; outline: none; max-width: 220px; }
        .wa-phone-row input:focus { border-color: #25d366; }
        .wa-email-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }
        .wa-email-row label { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; white-space: nowrap; }
        .wa-email-row input { flex: 1; padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 13px; outline: none; }
        .wa-email-row input:focus { border-color: #1565c0; }
        .wa-canal-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
        .wa-tab { padding: 6px 14px; border-radius: 20px; border: 2px solid #ddd; background: white; font-size: 12px; font-weight: 700; cursor: pointer; color: #555; transition: all 0.15s; }
        .wa-tab.ativo { color: white; border-color: transparent; }
        .wa-tab-wa.ativo  { background: #25d366; }
        .wa-tab-sms.ativo { background: #7c3aed; }
        .wa-tab-email.ativo { background: #1565c0; }
        .wa-btns { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-wa { display: flex; align-items: center; gap: 8px; padding: 11px 18px; border: none; border-radius: 9px; font-weight: 700; font-size: 13px; cursor: pointer; text-decoration: none; transition: all 0.15s; }
        .btn-wa-cobranca { background: #c62828; color: white; }
        .btn-wa-cobranca:hover { background: #b71c1c; }
        .btn-wa-extrato { background: #25d366; color: white; }
        .btn-wa-extrato:hover { background: #1ebe58; }
        .btn-wa-sms-extrato { background: #7c3aed; color: white; }
        .btn-wa-sms-extrato:hover { background: #6d28d9; }
        .btn-wa-email-extrato { background: #1565c0; color: white; }
        .btn-wa-email-extrato:hover { background: #0d47a1; }
        .btn-wa:disabled { background: #bbb !important; cursor: not-allowed; }
        .canal-panel { display: none; }
        .canal-panel.ativo { display: block; }

        /* PDF / Impressão */
        .btn-pdf { background: #e65100; color: white; border: none; padding: 7px 13px; border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer; }
        .btn-pdf:hover { background: #bf360c; }

        @media print {
            body { background: white !important; padding: 0 !important; }
            .container { box-shadow: none !important; border-radius: 0 !important; max-width: 100% !important; }
            .header-right, .btn-back, .btn-act, .btn-pdf, .wa-section,
            #modalEditar, #modalPagamento, .no-print { display: none !important; }
            .header { background: #1565c0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            @page { margin: 1.5cm; }
        }

        @media (max-width: 600px) {
            .grid2 { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .header { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>📋 <span id="headerTitulo">Contrato</span></h2>
        <div class="header-right">
            <button class="btn-pdf" onclick="gerarPDF()">🖨️ PDF</button>
            <button class="btn-act" onclick="abrirEditar()">✏️ Edit</button>
            <button class="btn-act" onclick="abrirPagamento()">+ Payment</button>
            <a href="LL_Contracts.html" class="btn-back">← Contracts</a>
        </div>
    </div>
    <div class="content" id="mainContent">
        <div style="text-align:center;padding:40px;color:#aaa;">⏳ Loading...</div>
    </div>
</div>

<!-- Edit Contract Modal -->
<div class="modal-overlay" id="modalEditar">
    <div class="modal" style="max-width:600px;max-height:90vh;overflow-y:auto;">
        <button class="modal-close" onclick="fecharModalEditar()">✕</button>
        <h3>✏️ Edit Contract</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div class="form-group">
                <label>Property ID</label>
                <input type="text" id="ePropertyId">
            </div>
            <div class="form-group">
                <label>Buyer Name</label>
                <input type="text" id="eBuyerName">
            </div>
            <div class="form-group">
                <label>Sale Type</label>
                <select id="eSaleType">
                    <option value="CFD">CFD</option>
                    <option value="CASH">Cash</option>
                    <option value="Finance">Finance</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="eStatus">
                    <option value="Active">Active</option>
                    <option value="PaidOff">Paid Off</option>
                    <option value="Default">Inadimplente</option>
                    <option value="Repossessed">Reintegrado</option>
                </select>
            </div>
            <div class="form-group">
                <label>County</label>
                <input type="text" id="eCounty">
            </div>
            <div class="form-group">
                <label>State</label>
                <input type="text" id="eState">
            </div>
            <div class="form-group">
                <label>Contract Date</label>
                <input type="date" id="eContractDate">
            </div>
            <div class="form-group">
                <label>Sale Price ($)</label>
                <input type="number" id="eContractPrice">
            </div>
            <div class="form-group">
                <label>Down Payment ($)</label>
                <input type="number" id="eDownPayment">
            </div>
            <div class="form-group">
                <label>Cost Basis ($)</label>
                <input type="number" id="eCostBasis">
            </div>
            <div class="form-group">
                <label>Monthly Installment ($)</label>
                <input type="number" id="eInstallmentAmount">
            </div>
            <div class="form-group">
                <label>Number of Installments</label>
                <input type="number" id="eInstallmentCount">
            </div>
            <div class="form-group">
                <label>1st Installment (date)</label>
                <input type="date" id="eFirstInstallmentDate">
            </div>
            <div class="form-group">
                <label>Installments paid by transfer</label>
                <input type="number" id="eInstallmentsPaidByTransfer" min="0" placeholder="0">
            </div>
            <div class="form-group">
                <label>Balloon ($)</label>
                <input type="number" id="eBalloonAmount">
            </div>
            <div class="form-group">
                <label>Balloon Date</label>
                <input type="date" id="eBalloonDate">
            </div>
            <div class="form-group">
                <label>Deed Status</label>
                <select id="eDeedStatus">
                    <option value="">—</option>
                    <option value="Pending">Pending</option>
                    <option value="Filed">Filed</option>
                    <option value="Transferred">Transferred</option>
                </select>
            </div>
            <div class="form-group">
                <label>Origin Type</label>
                <select id="eOriginType">
                    <option value="Acquisition">Acquisition</option>
                    <option value="Referral">Referral</option>
                    <option value="Direct">Direct</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Folder Link (Google Drive)</label>
            <input type="text" id="eDocumentFolderLink" placeholder="https://drive.google.com/...">
        </div>
        <div class="form-group">
            <label>Notes</label>
            <input type="text" id="eNotes">
        </div>
        <button class="btn-save" onclick="salvarEdicao()">💾 Save Changes</button>
    </div>
</div>

<!-- Payment Modal -->
<div class="modal-overlay" id="modalPagamento">
    <div class="modal">
        <button class="modal-close" onclick="fecharModal()">✕</button>
        <h3>Register Payment</h3>
        <div class="form-group">
            <label>Payment Date *</label>
            <input type="date" id="pDate">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Total Received (USD) *</label>
                <input type="number" id="pTotal" placeholder="220.00" oninput="splitPagamento()">
            </div>
            <div class="form-group">
                <label>Late Fee (USD)</label>
                <input type="number" id="pLateFee" placeholder="0" oninput="splitPagamento()">
            </div>
        </div>
        <div class="form-group" style="background:#f5f5f5;border-radius:8px;padding:8px 12px;font-size:12px;color:#555;" id="pSplitInfo">
            Principal = Total − Late Fee
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Channel</label>
                <select id="pChannel">
                    <option>Zelle</option>
                    <option>ACH</option>
                    <option>Cash</option>
                    <option>Check</option>
                    <option>Wire</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Received by</label>
                <select id="pReceivedBy">
                    <option value="GT_REAL">GT Real Assets Bank</option>
                    <option value="LEGACY">Legacy Account</option>
                    <option value="PERSONAL">Personal</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Memo / Note</label>
            <input type="text" id="pMemo" placeholder="ex: installment #5, November">
        </div>
        <button class="btn-save" onclick="salvarPagamento()">💾 Save Payment</button>
    </div>
</div>

<a href="LL_Menu.html" style="position:fixed;bottom:20px;right:20px;background:#1565c0;color:white;padding:10px 18px;border-radius:25px;text-decoration:none;font-weight:700;font-size:13px;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:999;">🏡 Menu</a>

<script type="module">
    import { auth, onAuthStateChanged, getLLContracts, getLLInstallments, getLLPayments, getLLBuyers, saveLLPayment, deleteLLPayment, updateLLInstallment, updateLLContract } from './firebase-config.js';

    const params = new URLSearchParams(window.location.search);
    const contratoId = params.get('id');

    let contrato = null;
    let parcelas = [];
    let pagamentos = [];
    let buyer = null;


    const fmt2 = v => '$' + parseFloat(v || 0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    const safeDate = d => { if (!d) return null; const s = (typeof d === 'string' && d.includes('T')) ? d : d + 'T12:00:00'; const dt = new Date(s); return isNaN(dt) ? null : dt; };
    const fmtData = d => { if (!d) return '—'; const s = d.includes('T') ? d : d + 'T12:00:00'; const dt = new Date(s); return isNaN(dt) ? '—' : dt.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}); };

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'GT_Smart_Login.html'; return; }
        if (!contratoId) { document.getElementById('mainContent').innerHTML = '<div class="empty">❌ ID do contrato não encontrado.</div>'; return; }

        const [todos, allParcelas, allPags, allBuyers] = await Promise.all([
            getLLContracts(), getLLInstallments(), getLLPayments(), getLLBuyers()
        ]);

        contrato = todos.find(c => c.id === contratoId);
        if (!contrato) { document.getElementById('mainContent').innerHTML = '<div class="empty">❌ Contract not found.</div>'; return; }

        buyer = allBuyers.find(b =>
            b.contractId === contratoId ||
            b.propertyId === contrato.propertyId ||
            (b.fullName && contrato.buyerName && b.fullName.toLowerCase() === contrato.buyerName.toLowerCase())
        ) || null;

        parcelas = allParcelas.filter(p => p.contractId === contratoId).sort((a,b) => {
            // Ordena por data de vencimento (balloon aparece na posição cronológica correta)
            const da = a.dueDate || '', db = b.dueDate || '';
            if (da < db) return -1;
            if (da > db) return 1;
            // Mesma data: regular antes de balloon
            const ta = (a.type||'').toLowerCase(), tb = (b.type||'').toLowerCase();
            if (ta === 'balloon' && tb !== 'balloon') return 1;
            if (tb === 'balloon' && ta !== 'balloon') return -1;
            return a.installmentNumber - b.installmentNumber;
        });
        parcelas.forEach(p => { p.status = (p.status || 'PENDING').toUpperCase(); });
        pagamentos = allPags.filter(p => p.contractId === contratoId).sort((a,b) => b.paymentDate?.localeCompare(a.paymentDate));

        document.getElementById('headerTitulo').textContent = contrato.propertyId + ' — ' + contrato.buyerName;
        document.getElementById('pDate').value = (() => { const _d = new Date(); return _d.getFullYear() + '-' + String(_d.getMonth()+1).padStart(2,'0') + '-' + String(_d.getDate()).padStart(2,'0'); })();

        renderTudo();
    });

    function renderTudo() {
        const hoje = new Date();
        const pagas = parcelas.filter(p => p.status === 'PAID' && (p.type||'').toLowerCase() !== 'balloon').length;
        const total = parcelas.filter(p => (p.type||'').toLowerCase() !== 'balloon').length;
        const pct = total > 0 ? Math.round((pagas / total) * 100) : 0;

        const totalRecebido = pagamentos.reduce((s, p) => s + parseFloat(p.amountTotal || 0), 0);
        const balance = parseFloat(contrato.installmentAmount || 0) * parseInt(contrato.installmentCount || 0);
        const lucro = parseFloat(contrato.contractPrice || 0) - parseFloat(contrato.costBasis || 0);

        // Marcar vencidas
        parcelas.forEach(p => {
            if (p.status !== 'PAID') {
                const d = safeDate(p.dueDate);
                if (d < hoje) p._overdue = true;
            }
        });

        document.getElementById('mainContent').innerHTML = `
            <div class="grid2">
                <div class="info-card">
                    <div class="card-title">📋 Contract</div>
                    <div class="info-row"><span class="info-lbl">Property ID</span><span class="info-val blue">${contrato.propertyId || '—'}</span></div>
                    <div class="info-row"><span class="info-lbl">Buyer</span><span class="info-val">${contrato.buyerName || '—'}</span></div>
                    <div class="info-row"><span class="info-lbl">Type</span><span class="info-val">${contrato.saleType || '—'}</span></div>
                    <div class="info-row"><span class="info-lbl">County / State</span><span class="info-val">${contrato.county || '—'}${contrato.state ? ', ' + contrato.state : ''}</span></div>
                    <div class="info-row"><span class="info-lbl">Contract Date</span><span class="info-val">${fmtData(contrato.contractDate)}</span></div>
                    <div class="info-row"><span class="info-lbl">Status</span><span class="info-val"><span class="status s-${contrato.status}">${contrato.status === 'Active' ? 'Active' : contrato.status}</span></span></div>
                    ${contrato.documentFolderLink ? `<div class="info-row"><span class="info-lbl">Documents</span><span class="info-val"><a href="${contrato.documentFolderLink}" target="_blank" style="color:#1565c0;">Open Drive ↗</a></span></div>` : ''}
                    ${contrato.notes ? `<div class="info-row"><span class="info-lbl">Notes</span><span class="info-val">${contrato.notes}</span></div>` : ''}
                </div>

                <div class="info-card">
                    <div class="card-title">💰 Financials</div>
                    <div class="info-row"><span class="info-lbl">Sale Price</span><span class="info-val">${fmt2(contrato.contractPrice)}</span></div>
                    <div class="info-row"><span class="info-lbl">Down Payment</span><span class="info-val">${fmt2(contrato.downPayment)}</span></div>
                    ${contrato.saleType === 'CFD' ? `
                    <div class="info-row"><span class="info-lbl">Monthly Installment</span><span class="info-val">${fmt2(contrato.installmentAmount)} × ${contrato.installmentCount}</span></div>
                    <div class="info-row"><span class="info-lbl">Balance Total</span><span class="info-val">${fmt2(balance)}</span></div>
                    ` : ''}
                    ${contrato.balloonAmount > 0 ? `<div class="info-row"><span class="info-lbl">Balloon</span><span class="info-val">${fmt2(contrato.balloonAmount)} on ${fmtData(contrato.balloonDate)}</span></div>` : ''}
                    <div class="info-row"><span class="info-lbl">Cost Basis</span><span class="info-val">${fmt2(contrato.costBasis)}</span></div>
                    <div class="info-row"><span class="info-lbl">Est. Profit</span><span class="info-val green">${fmt2(lucro)}</span></div>
                    <div class="info-row"><span class="info-lbl">Total Received</span><span class="info-val green">${fmt2(totalRecebido)}</span></div>
                    ${contrato.saleType === 'CFD' && total > 0 ? `
                    <div style="margin-top:10px;">
                        <div style="font-size:11px;color:#888;margin-bottom:4px;">Progress: ${pagas}/${total} installments paid</div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                        <div class="progress-pct">${pct}%</div>
                    </div>
                    ` : ''}
                </div>
            </div>

            <!-- Parcelas -->
            ${contrato.saleType === 'CFD' ? `
            <div style="margin-bottom:20px;">
                <div class="section-title">
                    📅 Installments (${pagas}/${total} paid)
                    <span style="font-size:12px;font-weight:400;color:#888;">${parcelas.filter(p => p._overdue).length} overdue</span>
                </div>
                ${parcelas.length === 0 ? '<div class="empty">No installments found. Edit the contract and click "Save + Generate Installments".</div>' : `
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>#</th><th>Due Date</th><th>Amount</th><th>Type</th><th>Status</th><th>Paid On</th><th>Action</th></tr></thead>
                        <tbody>
                            ${contrato.downPayment > 0 ? `
                                <tr class="pago" style="background:#f0fdf4;">
                                    <td style="color:#166534;font-weight:700;">—</td>
                                    <td>${fmtData(contrato.contractDate)}</td>
                                    <td>${fmt2(contrato.downPayment)}</td>
                                    <td><span class="inst-status" style="background:#dcfce7;color:#166534;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;">Down Payment</span></td>
                                    <td><span class="inst-status is-PAID">Paid</span></td>
                                    <td style="font-size:11px;color:#aaa;">${fmtData(contrato.contractDate)}</td>
                                    <td></td>
                                </tr>` : ''}
                            ${parcelas.map(p => {
                                const isBalloon = (p.type||'').toLowerCase() === 'balloon';
                                const tipoLabel = isBalloon ? 'Balloon' : 'Regular';
                                const tipoClass = isBalloon ? 'is-BALLOON' : 'is-regular';
                                return `
                                <tr class="${p.status === 'PAID' ? 'pago' : p._overdue ? 'vencida' : ''}${isBalloon ? '" style="background:#fff8e1;' : ''}">
                                    <td>${isBalloon ? '🎈' : p.installmentNumber}</td>
                                    <td>${fmtData(p.dueDate)}${p._overdue && p.status !== 'PAID' ? ' <span style="color:#c62828;font-size:10px;font-weight:700;">OVERDUE</span>' : ''}</td>
                                    <td>${fmt2(p.amount)}</td>
                                    <td><span class="inst-status ${tipoClass}">${tipoLabel}</span></td>
                                    <td><span class="inst-status is-${p.status}">${p.status === 'PAID' ? 'Paid' : p._overdue ? 'Overdue' : 'Pending'}</span></td>
                                    <td style="font-size:11px;color:#aaa;">${p.status === 'PAID' ? fmtData(p.paidDate) : '—'}</td>
                                    <td>
                                        ${p.status !== 'PAID' 
                                            ? `<button class="btn-sm btn-pagar" onclick="marcarPago('${p.id}')">✅ Mark paid</button>` 
                                            : `<button class="btn-sm btn-despagar" onclick="marcarPending('${p.id}')">↩️ Undo</button>`
                                        }
                                    </td>
                                </tr>
                            `; }).join('')}
                        </tbody>
                    </table>
                </div>
                `}
            </div>
            ` : ''}

            <!-- Pagamentos -->
            <div>
                <div class="section-title">
                    💰 Payments Received
                    <button class="btn-pag-novo" onclick="abrirPagamento()">+ New</button>
                </div>
                ${(() => {
                    const dpVal = parseFloat(contrato.downPayment || 0);
                    const dpDate = contrato.contractDate || '';
                    const dpRow = dpVal > 0 ? `
                        <div class="pagamento-item" style="background:#f0fdf4;border-left:3px solid #22c55e;">
                            <div class="pag-left">
                                <div class="pag-valor" style="color:#166534;">${fmt2(dpVal)}</div>
                                <div class="pag-info">${fmtData(dpDate)} &nbsp;·&nbsp; <span class="canal-badge" style="background:#dcfce7;color:#166534;">DOWN PAYMENT</span></div>
                            </div>
                        </div>` : '';
                    const pagsHtml = pagamentos.length === 0 ? '' : pagamentos.map(p => `
                        <div class="pagamento-item">
                            <div class="pag-left">
                                <div class="pag-valor">${fmt2(p.amountTotal)}</div>
                                <div class="pag-info">
                                    ${fmtData(p.paymentDate)} &nbsp;·&nbsp;
                                    <span class="canal-badge">${p.channel || '—'}</span>
                                    <span class="canal-badge">${(p.receivedBy === 'GT_REAL' || p.receivedBy === 'GT_REAL_BANK') ? 'GT Real' : p.receivedBy === 'LEGACY' ? 'Legacy' : p.receivedBy || 'Personal'}</span>
                                    ${p.memo ? '&nbsp;·&nbsp; ' + p.memo : ''}
                                    ${parseFloat(p.lateFeeAmount) > 0 ? `&nbsp;·&nbsp; Late fee: ${fmt2(p.lateFeeAmount)}` : ''}
                                </div>
                            </div>
                            <button class="btn-sm btn-despagar" onclick="excluirPagamento('${p.id}')">🗑️</button>
                        </div>
                    `).join('');
                    return dpRow + pagsHtml || '<div class="empty">No payments recorded yet.</div>';
                })()}
            </div>
            <!-- Enviar -->
            <div class="wa-section">
                <div class="wa-title">📤 Send to Client</div>

                <!-- Abas de canal -->
                <div class="wa-canal-tabs">
                    <button class="wa-tab wa-tab-wa ativo" onclick="selecionarChannel('wa')">📱 WhatsApp</button>
                    <button class="wa-tab wa-tab-sms" onclick="selecionarChannel('sms')">💬 SMS</button>
                    <button class="wa-tab wa-tab-email" onclick="selecionarChannel('email')">✉️ Email</button>
                </div>

                <!-- Painel WhatsApp -->
                <div class="canal-panel ativo" id="painelWa">
                    <div class="wa-phone-row">
                        <label>Phone:</label>
                        <input type="tel" id="waPhone" placeholder="+1 (305) 000-0000">
                    </div>
                    <div class="wa-btns">
                        <button class="btn-wa btn-wa-cobranca" onclick="enviar('wa','cobranca')">🔴 Late Payment Notice</button>
                        <button class="btn-wa btn-wa-extrato" onclick="enviar('wa','extrato')">📄 Full Statement</button>
                    </div>
                </div>

                <!-- Painel SMS -->
                <div class="canal-panel" id="painelSms">
                    <div class="wa-phone-row">
                        <label>Phone:</label>
                        <input type="tel" id="smsPhone" placeholder="+1 (305) 000-0000">
                    </div>
                    <div class="wa-btns">
                        <button class="btn-wa btn-wa-cobranca" onclick="enviar('sms','cobranca')">🔴 Late Payment Notice</button>
                        <button class="btn-wa btn-wa-sms-extrato" onclick="enviar('sms','extrato')">📄 Full Statement</button>
                    </div>
                </div>

                <!-- Painel Email -->
                <div class="canal-panel" id="painelEmail">
                    <div class="wa-email-row">
                        <label>Email:</label>
                        <input type="email" id="emailAddr" placeholder="client@email.com">
                    </div>
                    <div class="wa-btns">
                        <button class="btn-wa btn-wa-cobranca" onclick="enviar('email','cobranca')">🔴 Late Payment Notice</button>
                        <button class="btn-wa btn-wa-email-extrato" onclick="enviar('email','extrato')">📄 Full Statement</button>
                    </div>
                </div>
            </div>
        `;
        // Preencher contato automaticamente após o DOM estar pronto
        preencherContato();
    }

    window.marcarPago = async function(id) {
        const hoje = (() => { const _d = new Date(); return _d.getFullYear() + '-' + String(_d.getMonth()+1).padStart(2,'0') + '-' + String(_d.getDate()).padStart(2,'0'); })();
        await updateLLInstallment(id, { status: 'PAID', paidDate: hoje });
        const p = parcelas.find(x => x.id === id);
        if (p) { p.status = 'PAID'; p.paidDate = hoje; }
        renderTudo();
    };

    window.marcarPending = async function(id) {
        await updateLLInstallment(id, { status: 'PENDING', paidDate: '' });
        const p = parcelas.find(x => x.id === id);
        if (p) { p.status = 'PENDING'; p.paidDate = ''; }
        renderTudo();
    };

    window.abrirEditar = function() {
        if (!contrato) return;
        const c = contrato;
        document.getElementById('ePropertyId').value = c.propertyId || '';
        document.getElementById('eBuyerName').value = c.buyerName || '';
        document.getElementById('eSaleType').value = c.saleType || 'CFD';
        document.getElementById('eStatus').value = c.status || 'Active';
        document.getElementById('eCounty').value = c.county || '';
        document.getElementById('eState').value = c.state || '';
        document.getElementById('eContractDate').value = c.contractDate || '';
        document.getElementById('eContractPrice').value = c.contractPrice || '';
        document.getElementById('eDownPayment').value = c.downPayment || '';
        document.getElementById('eCostBasis').value = c.costBasis || '';
        document.getElementById('eInstallmentAmount').value = c.installmentAmount || '';
        document.getElementById('eInstallmentCount').value = c.installmentCount || '';
        document.getElementById('eFirstInstallmentDate').value = c.firstInstallmentDate || '';
        document.getElementById('eInstallmentsPaidByTransfer').value = c.installmentsPaidByTransfer || 0;
        document.getElementById('eBalloonAmount').value = c.balloonAmount || '';
        document.getElementById('eBalloonDate').value = c.balloonDate || '';
        document.getElementById('eDeedStatus').value = c.deedStatus || '';
        document.getElementById('eOriginType').value = c.originType || 'Acquisition';
        document.getElementById('eDocumentFolderLink').value = c.documentFolderLink || '';
        document.getElementById('eNotes').value = c.notes || '';
        document.getElementById('modalEditar').classList.add('open');
    };

    window.fecharModalEditar = function() {
        document.getElementById('modalEditar').classList.remove('open');
    };

    window.salvarEdicao = async function() {
        const dados = {
            propertyId: document.getElementById('ePropertyId').value.trim(),
            buyerName: document.getElementById('eBuyerName').value.trim(),
            saleType: document.getElementById('eSaleType').value,
            status: document.getElementById('eStatus').value,
            county: document.getElementById('eCounty').value.trim(),
            state: document.getElementById('eState').value.trim(),
            contractDate: document.getElementById('eContractDate').value,
            contractPrice: parseFloat(document.getElementById('eContractPrice').value) || 0,
            downPayment: parseFloat(document.getElementById('eDownPayment').value) || 0,
            costBasis: parseFloat(document.getElementById('eCostBasis').value) || 0,
            installmentAmount: parseFloat(document.getElementById('eInstallmentAmount').value) || 0,
            installmentCount: parseInt(document.getElementById('eInstallmentCount').value) || 0,
            firstInstallmentDate: document.getElementById('eFirstInstallmentDate').value,
            installmentsPaidByTransfer: parseInt(document.getElementById('eInstallmentsPaidByTransfer').value) || 0,
            balloonAmount: parseFloat(document.getElementById('eBalloonAmount').value) || 0,
            balloonDate: document.getElementById('eBalloonDate').value,
            deedStatus: document.getElementById('eDeedStatus').value,
            originType: document.getElementById('eOriginType').value,
            documentFolderLink: document.getElementById('eDocumentFolderLink').value.trim(),
            notes: document.getElementById('eNotes').value.trim(),
        };
        if (!dados.propertyId || !dados.buyerName) { alert('Property ID and Buyer Name are required!'); return; }
        const ok = await updateLLContract(contratoId, dados);
        if (ok !== false) {
            Object.assign(contrato, dados);
            document.getElementById('headerTitulo').textContent = contrato.propertyId + ' — ' + contrato.buyerName;
            fecharModalEditar();
            renderTudo();
        }
    };

    window.splitPagamento = function() {
        const total = parseFloat(document.getElementById('pTotal').value) || 0;
        const fee = parseFloat(document.getElementById('pLateFee').value) || 0;
        const principal = Math.max(0, total - fee);
        document.getElementById('pSplitInfo').textContent = `Principal: $${principal.toFixed(2)} | Late Fee: $${fee.toFixed(2)} | Total: $${total.toFixed(2)}`;
    };

    window.abrirPagamento = function() {
        document.getElementById('modalPagamento').classList.add('open');
    };

    window.fecharModal = function() {
        document.getElementById('modalPagamento').classList.remove('open');
    };

    window.salvarPagamento = async function() {
        const paymentDate = document.getElementById('pDate').value;
        const amountTotal = document.getElementById('pTotal').value;
        if (!paymentDate || !amountTotal) { alert('❌ Date and amount are required!'); return; }

        const lateFee = parseFloat(document.getElementById('pLateFee').value) || 0;
        const principal = Math.max(0, parseFloat(amountTotal) - lateFee);

        const data = {
            contractId: contratoId,
            propertyId: contrato.propertyId,
            paymentDate,
            amountTotal: parseFloat(amountTotal),
            principalAmount: principal,
            lateFeeAmount: lateFee,
            channel: document.getElementById('pChannel').value,
            receivedBy: document.getElementById('pReceivedBy').value,
            memo: document.getElementById('pMemo').value.trim(),
        };

        const newId = await saveLLPayment(data);
        if (newId) {
            pagamentos.unshift({ ...data, id: newId });
            fecharModal();
            renderTudo();
        }
    };

    window.excluirPagamento = async function(id) {
        if (!confirm('Delete this payment?')) return;
        const { deleteLLPayment: del } = await import('./firebase-config.js');
        await del(id);
        pagamentos = pagamentos.filter(p => p.id !== id);
        renderTudo();
    };

    window.selecionarChannel = function(canal) {
        document.querySelectorAll('.wa-tab').forEach(t => t.classList.remove('ativo'));
        document.querySelectorAll('.canal-panel').forEach(p => p.classList.remove('ativo'));
        document.querySelector('.wa-tab-' + canal).classList.add('ativo');
        document.getElementById('painel' + canal.charAt(0).toUpperCase() + canal.slice(1)).classList.add('ativo');
    };

    // Preencher contato automaticamente ao carregar
    function preencherContato() {
        const phone = contrato.buyerPhone || contrato.phone || buyer?.phone || '';
        const email = contrato.buyerEmail || contrato.email || buyer?.email || '';
        if (phone) {
            const waEl = document.getElementById('waPhone');
            const smsEl = document.getElementById('smsPhone');
            if (waEl) waEl.value = phone;
            if (smsEl) smsEl.value = phone;
        }
        if (email) {
            const emailEl = document.getElementById('emailAddr');
            if (emailEl) emailEl.value = email;
        }
    }
    // contato preenchido automaticamente pelo renderTudo()

    window.enviar = function(canal, tipo) {
        const hoje = new Date();
        const nome = (contrato.buyerName || '').split(' ')[0];
        const propId = contrato.propertyId || '';
        const propAddr = contrato.propertyAddress || contrato.address || '';
        const parcela = fmt2(contrato.installmentAmount || 0);
        const pagas = parcelas.filter(p => p.status === 'PAID' && (p.type||'').toLowerCase() !== 'balloon').length;
        const total = parcelas.filter(p => (p.type||'').toLowerCase() !== 'balloon').length;
        const restantes = total - pagas;
        const totalContrato = fmt2((contrato.installmentAmount || 0) * total + parseFloat(contrato.downPayment || 0) + parseFloat(contrato.balloonAmount || 0));
        const balance = fmt2((contrato.installmentAmount || 0) * restantes + (contrato.balloonAmount || 0));
        const pct = total > 0 ? Math.round((pagas / total) * 100) : 0;

        const atrasadas = parcelas.filter(p => p.status !== 'PAID' && p._overdue);
        const primeiraAtrasada = atrasadas.sort((a,b) => a.installmentNumber - b.installmentNumber)[0];
        const diasAtraso = primeiraAtrasada ? Math.floor((hoje - safeDate(primeiraAtrasada.dueDate)) / 86400000) : 0;
        const qtdAtrasadas = atrasadas.length;
        const totalAtrasado = fmt2(qtdAtrasadas * (contrato.installmentAmount || 0));

        const sortedPags = [...pagamentos].sort((a,b) => a.paymentDate?.localeCompare(b.paymentDate));
        const totalRecebido = fmt2(pagamentos.reduce((s,p) => s + parseFloat(p.amountTotal||0), 0) + parseFloat(contrato.downPayment||0));
        const sep = '━━━━━━━━━━━━━━━━━━━━━━';
        const contractDate = fmtData(contrato.contractDate);

        // Próxima parcela pendente
        const proximaPending = parcelas.filter(p => p.status !== 'PAID' && (p.type||'').toLowerCase() !== 'balloon').sort((a,b) => a.installmentNumber - b.installmentNumber)[0];
        const proximaDataStr = proximaPending ? fmtData(proximaPending.dueDate) : null;
        const proximaValor = proximaPending ? fmt2(proximaPending.amount || contrato.installmentAmount || 0) : null;

        // Data prevista de quitação (última parcela regular)
        const ultimaParcela = [...parcelas].filter(p => (p.type||'').toLowerCase() !== 'balloon').sort((a,b) => b.installmentNumber - a.installmentNumber)[0];
        const payoffDate = ultimaParcela ? fmtData(ultimaParcela.dueDate) : null;

        // Motivação baseada no progresso
        const motivacao = pct >= 75 ? '🔥 Almost there!' : pct >= 50 ? '🎯 Halfway through!' : pct >= 25 ? '💪 Great progress!' : '🌱 Just getting started!';

        const assinatura = `GT Lands 🏡\nwww.gtlands.com`;

        let msg = '';
        if (tipo === 'cobranca') {
            if (qtdAtrasadas === 0) { alert('No overdue payments on this contract.'); return; }
            const dataVenc = primeiraAtrasada ? fmtData(primeiraAtrasada.dueDate) : '—';
            msg = `Hi ${nome} 👋\n\n${sep}\n🏠 *Property ${propId}*\n${propAddr ? '📍 ' + propAddr + '\n' : ''}📅 Contract signed: ${contractDate}\n${sep}\n\n⚠️ *PAYMENT REMINDER*\n\nYou have ${qtdAtrasadas === 1 ? '1 overdue payment' : qtdAtrasadas + ' overdue payments'}.\n\n📆 Overdue since: ${dataVenc} (${diasAtraso} days)\n💸 Total past due: ${totalAtrasado}\n💳 Monthly payment: ${parcela}\n\nPlease send your payment at your earliest convenience.\n\n📎 If you have already made the payment, please send us the receipt.\n\n${sep}\n${assinatura}`;
        } else {
            let numReg = 0;
            const allLinhas = [];
            if (contrato.downPayment > 0) allLinhas.push(`📥 ${fmtData(contrato.contractDate)} · ${fmt2(contrato.downPayment)}\n   ↳ Down Payment`);
            sortedPags.forEach(p => {
                const isBalloon = (p.memo || '').toLowerCase().includes('balloon');
                if (isBalloon) {
                    allLinhas.push(`🎈 ${fmtData(p.paymentDate)} · ${fmt2(p.amountTotal)}\n   ↳ Balloon Payment`);
                } else {
                    numReg++;
                    allLinhas.push(`✅ ${fmtData(p.paymentDate)} · ${fmt2(p.amountTotal)}\n   ↳ Payment ${numReg}/${total}`);
                }
            });
            const historicoStr = allLinhas.length > 0 ? allLinhas.join('\n\n') : '—';
            msg = `Hi ${nome} 👋\n\n${sep}\n🏠 *Property ${propId}*\n${propAddr ? '📍 ' + propAddr + '\n' : ''}📅 Contract signed: ${contractDate}\n${sep}\n\n📊 *OVERVIEW*\n\n✅ Payments made: ${pagas} of ${total} (${pct}%)\n${motivacao}\n\n🎯 Contract total: ${totalContrato}\n💰 Total received: ${totalRecebido}\n📌 Remaining balance: ~${balance}\n\n${proximaDataStr ? '📆 Next payment: ' + proximaDataStr + ' · ' + proximaValor + '\n' : ''}${payoffDate ? '🏁 Expected payoff: ' + payoffDate + '\n' : ''}\n${sep}\n\n📋 *PAYMENT HISTORY*\n\n${historicoStr}\n\n${sep}\n\n${assinatura}`;
        }

        if (canal === 'wa') {
            const rawPhone = (document.getElementById('waPhone')?.value || '').replace(/\D/g, '');
            if (!rawPhone) { alert('Enter the WhatsApp number.'); return; }
            const fPhone = rawPhone.length === 10 ? '1' + rawPhone : rawPhone;
            window.open(`https://wa.me/${fPhone}?text=${encodeURIComponent(msg)}`, '_blank');
        } else if (canal === 'sms') {
            const rawPhone = (document.getElementById('smsPhone')?.value || '').replace(/\D/g, '');
            if (!rawPhone) { alert('Enter the SMS number.'); return; }
            const fPhone = rawPhone.length === 10 ? '1' + rawPhone : rawPhone;
            window.open(`sms:+${fPhone}?body=${encodeURIComponent(msg)}`, '_blank');
        } else if (canal === 'email') {
            const emailAddr = (document.getElementById('emailAddr')?.value || '').trim();
            if (!emailAddr) { alert('Enter the email address.'); return; }
            const subject = tipo === 'cobranca'
                ? `Payment Reminder — Property ${propId}`
                : `Payment Statement — Property ${propId}`;
            window.open(`mailto:${emailAddr}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(msg)}`, '_blank');
        }
    };

    // Manter compatibilidade com código antigo
    window.enviarWA = (tipo) => window.enviar('wa', tipo);

    window.gerarPDF = function() {
        // Esconder seção de envio temporariamente
        const waSection = document.querySelector('.wa-section');
        if (waSection) waSection.style.display = 'none';
        window.print();
        setTimeout(() => { if (waSection) waSection.style.display = ''; }, 1000);
    };

    document.getElementById('modalEditar').addEventListener('click', e => {
        if (e.target === document.getElementById('modalEditar')) fecharModalEditar();
    });

    document.getElementById('modalPagamento').addEventListener('click', e => {
        if (e.target === document.getElementById('modalPagamento')) fecharModal();
    });
</script>
</body>
</html>
